    *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

      --red: #f87171;

      --blue: #60a5fa;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
      --shadow2: 0 1px 3px rgba(0,0,0,0.3);
      --radius: 16px;
      --radius2: 12px;
      --radius3: 8px;
    }
    body {
      margin: 0; padding: 0;
      font-family: 'DM Sans', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }
    input, button, select, textarea { font-family: inherit; }
    input[type="range"] { -webkit-appearance: none; width: 100%; height: 4px; border-radius: 2px; background: var(--surface2); outline: none; }
    input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%; background: var(--accent); cursor: pointer; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 2px; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideUpFull { from { opacity: 0; transform: translateY(100%); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
    @keyframes pulseBig { 0%,100% { transform:scale(1); } 50% { transform:scale(1.06); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes confettiFall { 0% { transform: translateY(0) rotate(0deg); opacity:1; } 100% { transform: translateY(100vh) rotate(720deg); opacity:0; } }
    @keyframes popIn { 0% { transform:scale(0.4); opacity:0; } 70% { transform:scale(1.12); } 100% { transform:scale(1); opacity:1; } }
    @keyframes kingPulse { 0%,100% { box-shadow:0 0 0 0 rgba(74,222,128,0); } 50% { box-shadow:0 0 0 6px rgba(74,222,128,0.15); } }
    .animate-in { animation: slideUp 0.25s ease-out; }
    .pac-container { 
      background: var(--surface) !important; 
      border-radius: var(--radius2) !important; 
      margin-top: 6px !important; 
      z-index: 99999 !important; 
      border: 1px solid var(--border2) !important;
      box-shadow: var(--shadow) !important;
      font-family: 'DM Sans', sans-serif !important;
    }
    .pac-item { 
      background: var(--surface) !important; 
      color: var(--text) !important; 
      padding: 12px 16px !important; 
      border-top: 1px solid var(--border) !important; 
      cursor: pointer !important;
      font-size: 14px !important;
    }
    .pac-item:first-child { border-top: none !important; border-radius: var(--radius2) var(--radius2) 0 0 !important; }
    .pac-item:last-child { border-radius: 0 0 var(--radius2) var(--radius2) !important; }
    .pac-item:hover, .pac-item-selected { background: var(--surface2) !important; }
    .pac-item-query { color: var(--text) !important; font-weight: 600 !important; }
    .pac-matched { color: var(--accent) !important; font-weight: 700 !important; }
    .pac-icon, .pac-icon-marker { display: none !important; }
    .pac-item span { color: var(--text2) !important; }
    .pac-item span.pac-item-query { color: var(--text) !important; }
    .pac-item span.pac-matched { color: var(--accent) !important; }
  </style>
</head>

      const [currentUser, setCurrentUser] = useState(null);
      const [userProfile, setUserProfile] = useState(null);
      const [loading, setLoading] = useState(true);

      const createUserProfile = async (user, extra = {}) => {
        const doc = await db.collection('users').doc(user.uid).get();
        if (!doc.exists) {
          const profile = {
            oderId: user.uid, email: user.email,
            firstName: extra.firstName || user.displayName?.split(' ')[0] || '',
            lastName: extra.lastName || user.displayName?.split(' ').slice(1).join(' ') || '',
            phone: '', photoURL: user.photoURL || '',
            roles: ['player'],
            location: '', locationCoords: null, skillLevel: 'intermediate',
            friends: [], friendRequests: [], sentRequests: [],
            stats: { gamesPlayed: 0, totalPlayTime: 0, totalWinners: 0, totalWins: 0 },
            coachProfile: null, courts: [],
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
          };
          await db.collection('users').doc(user.uid).set(profile);
          setUserProfile(profile);
        } else {
          const data = doc.data();
          if (!data.roles) data.roles = ['player'];
          if (user.photoURL && user.photoURL !== data.photoURL) {
            await db.collection('users').doc(user.uid).update({ photoURL: user.photoURL });
            setUserProfile({ ...data, photoURL: user.photoURL });
          } else setUserProfile(data);
        }
      };

      const signInWithGoogle = async () => {
        try {
          const r = await auth.signInWithPopup(googleProvider);
          await createUserProfile(r.user); return r.user;
        } catch (err) {
          if (['auth/popup-blocked','auth/popup-closed-by-user','auth/cancelled-popup-request'].includes(err.code)) {
            await auth.signInWithRedirect(googleProvider); return null;
          }
          throw err;
        }
      };
      const signUpWithEmail = async (e, p, fn, ln) => { const r = await auth.createUserWithEmailAndPassword(e, p); await createUserProfile(r.user, { firstName: fn, lastName: ln }); return r.user; };
      const signInWithEmail = async (e, p) => { const r = await auth.signInWithEmailAndPassword(e, p); await createUserProfile(r.user); return r.user; };
      const logout = async () => { await auth.signOut(); setUserProfile(null); };
      const updateProfile = async (data) => { if (!currentUser) return; await db.collection('users').doc(currentUser.uid).update(data); setUserProfile(p => ({ ...p, ...data })); };
      const refreshProfile = async () => { if (!currentUser) return; const d = await db.collection('users').doc(currentUser.uid).get(); if (d.exists) setUserProfile(d.data()); };

      useEffect(() => {
        auth.getRedirectResult().then(async (r) => { if (r?.user) await createUserProfile(r.user); }).catch(console.error);
        return auth.onAuthStateChanged(async (user) => {
          setCurrentUser(user);
          if (user) { const d = await db.collection('users').doc(user.uid).get(); if (d.exists) setUserProfile(d.data()); }
          else setUserProfile(null);
          setLoading(false);
        });
      }, []);

      return <AuthContext.Provider value={{ currentUser, userProfile, signInWithGoogle, signUpWithEmail, signInWithEmail, logout, updateProfile, refreshProfile, loading }}>{children}</AuthContext.Provider>;

      const [local, setLocal] = useState(value || '');

      useEffect(() => { if (value !== undefined && value !== local) setLocal(value || ''); }, [value]);

          if (!inputRef.current || acRef.current) return;
          if (window.google?.maps?.places) {
            try {
              acRef.current = new window.google.maps.places.Autocomplete(inputRef.current, { types: ['geocode','establishment'] });
              acRef.current.addListener('place_changed', () => {
                const p = acRef.current.getPlace();
                if (!p) return;
                let addr = p.name && p.formatted_address && !p.formatted_address.startsWith(p.name) ? p.name+', '+p.formatted_address : p.formatted_address || p.name || '';
                const coords = p.geometry?.location ? { lat: p.geometry.location.lat(), lng: p.geometry.location.lng() } : null;
                setLocal(addr); onChangeRef.current?.(addr, coords);
              });
            } catch(e) {}
          }

        try {
          await db.collection('reviews').add({
            targetId, targetType, rating, text: text.trim(),
            authorId: currentUser.uid,
            authorName: `${userProfile?.firstName} ${userProfile?.lastName}`.trim(),
            authorPhoto: userProfile?.photoURL || '',
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
          });
          // Update average rating
          const snap = await db.collection('reviews').where('targetId', '==', targetId).get();
          const avg = snap.docs.reduce((s, d) => s + d.data().rating, 0) / snap.docs.length;
          await db.collection(targetType === 'court' ? 'courts' : 'users').doc(targetId).update({ avgRating: avg, reviewCount: snap.docs.length });
          onClose();
        } catch(e) { } finally { setSubmitting(false); }
      };

      const avgRating = reviews.length ? (reviews.reduce((s,r) => s+r.rating, 0) / reviews.length).toFixed(1) : null;

      return (
        <Modal onClose={onClose} title={`Reviews — ${targetName}`}>
          <Tabs tabs={[{key:'write',label:'Write Review'},{key:'read',label:`All Reviews (${reviews.length})`}]} active={tab} onChange={setTab} />
          {tab === 'write' ? (
            <div>
              <div style={{ textAlign:'center', marginBottom:'24px' }}>
                <div style={{ fontSize:'14px', color:'var(--text2)', marginBottom:'12px' }}>Your rating</div>
                <StarRating value={rating} onChange={setRating} size={32} />
              </div>
              <Textarea label="Your review (optional)" value={text} onChange={e => setText(e.target.value)} placeholder="Share your experience..." style={{ minHeight:'80px' }} />
              <Btn onClick={submit} disabled={!rating || submitting} size="lg">{submitting ? 'Submitting...' : 'Submit Review'}</Btn>
            </div>
          ) : (
            <div>
              {avgRating && <div style={{ display:'flex', alignItems:'center', gap:'12px', marginBottom:'20px', padding:'16px', background:'var(--surface)', borderRadius:'var(--radius2)' }}>
                <div style={{ fontSize:'36px', fontWeight:'700', color:'var(--accent)' }}>{avgRating}</div>
                <div>
                  <StarRating value={Math.round(avgRating)} size={16} readonly />
                  <div style={{ fontSize:'12px', color:'var(--text2)', marginTop:'4px' }}>{reviews.length} reviews</div>
                </div>
              </div>}
              {reviews.length === 0 ? <Empty icon="Star" title="No reviews yet" sub="Be the first to leave a review" /> :
                reviews.map(r => (
                  <div key={r.id} style={{ marginBottom:'16px', paddingBottom:'16px', borderBottom:'1px solid var(--border)' }}>
                    <div style={{ display:'flex', alignItems:'center', gap:'10px', marginBottom:'8px' }}>
                      <Avatar src={r.authorPhoto} name={r.authorName} size={32} />
                      <div>
                        <div style={{ fontWeight:'600', fontSize:'14px' }}>{r.authorName}</div>
                        <StarRating value={r.rating} size={12} readonly />
                      </div>
                    </div>
                    {r.text && <p style={{ margin:0, fontSize:'14px', color:'var(--text2)', lineHeight:'1.5' }}>{r.text}</p>}
                  </div>
                ))
              }
            </div>
          )}
        </Modal>
      );
    }

    // ==================== LOGIN SCREEN ====================
    function LoginScreen({ onLogin }) {

          else await signUpWithEmail(form.email, form.password, form.firstName, form.lastName);
          onLogin();
        } catch(e) { setError(e.message?.replace('Firebase: ','') || 'Something went wrong'); }
        finally { setLoading(false); }
      };

      const handleGoogle = async () => {
        setLoading(true); setError('');

            </div>
          </div>

    // ==================== INSTANT GAME MODAL ====================
    function InstantGameModal({ onClose }) {
      const { currentUser, userProfile } = useAuth();
      const [search, setSearch] = useState('');
      const [selected, setSelected] = useState([]);
      const [format, setFormat] = useState('kings');
      const [loading, setLoading] = useState(false);
      const [allUsers, setAllUsers] = useState([]);
      const [manualName, setManualName] = useState('');
      const [showManual, setShowManual] = useState(false);

      useEffect(() => {
        db.collection('users').limit(100).get().then(s => {
          setAllUsers(s.docs.map(d => ({ oderId:d.id, ...d.data() })).filter(u => u.oderId !== currentUser?.uid));
        }).catch(() => {});
      }, []);

      const filtered = search.length > 0
        ? allUsers.filter(u => `${u.firstName} ${u.lastName}`.toLowerCase().includes(search.toLowerCase()))
        : allUsers.slice(0, 20);

      const toggle = (u) => {
        if (selected.find(s => s.oderId === u.oderId)) setSelected(selected.filter(s => s.oderId !== u.oderId));
        else setSelected([...selected, u]);
      };

      const addManualPlayer = () => {
        const name = manualName.trim();
        if (!name) return;
        const id = 'manual_' + Date.now() + '_' + Math.random().toString(36).slice(2);
        setSelected(prev => [...prev, { oderId: id, firstName: name, lastName: '', photoURL: '', isManual: true }]);
        setManualName('');
        setShowManual(false);
      };

      const removeSelected = (oderId) => setSelected(selected.filter(s => s.oderId !== oderId));

      const startGame = () => {
        setLoading(true);
        const me = { 
          oderId: currentUser?.uid || 'host', 
          name: `${userProfile?.firstName || 'Host'} ${userProfile?.lastName || ''}`.trim(), 
          photoURL: userProfile?.photoURL || '' 
        };
        const others = selected.map(u => ({ 
          oderId: u.oderId, 
          name: u.isManual ? u.firstName : `${u.firstName} ${u.lastName}`.trim(), 
          photoURL: u.photoURL || '' 
        }));
        const allPlayers = [me, ...others];
        onClose(allPlayers, format);
      };

      return (
        <Modal onClose={() => onClose()} title="Instant Game">
          {/* Format */}
          <div style={{ marginBottom:'20px' }}>
            <div style={{ fontSize:'12px', color:'var(--text2)', marginBottom:'10px', fontWeight:'600', letterSpacing:'0.05em', textTransform:'uppercase' }}>Game Format</div>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'8px' }}>
              {[{k:'kings',l:"King's Court"},{k:'singles',l:'Singles'},{k:'doubles',l:'Doubles'},{k:'custom',l:'Custom'}].map(f => (
                <div key={f.k} onClick={() => setFormat(f.k)} style={{ padding:'14px 12px', borderRadius:'var(--radius2)', background: format===f.k ? 'var(--accent3)' : 'var(--surface)', border:`1px solid ${format===f.k ? 'var(--accent)' : 'var(--border)'}`, cursor:'pointer', textAlign:'center', fontSize:'14px', fontWeight:'700', color: format===f.k ? 'var(--accent)' : 'var(--text2)', transition:'all 0.15s' }}>
                  {f.l}
                </div>
              ))}
            </div>
          </div>

          {/* Players */}
          <div style={{ marginBottom:'16px' }}>
            <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:'10px' }}>
              <div style={{ fontSize:'12px', color:'var(--text2)', fontWeight:'600', letterSpacing:'0.05em', textTransform:'uppercase' }}>Select Players (optional)</div>
              <button onClick={() => setShowManual(!showManual)} style={{ background:'var(--surface2)', border:'1px solid var(--border2)', borderRadius:'var(--radius3)', padding:'5px 10px', color:'var(--text2)', fontSize:'12px', fontWeight:'600', cursor:'pointer' }}>
                + Add by name
              </button>
            </div>

            {/* Manual name input */}
            {showManual && (
              <div style={{ display:'flex', gap:'8px', marginBottom:'12px', padding:'12px', background:'var(--surface)', borderRadius:'var(--radius2)', border:'1px solid var(--border2)' }}>
                <input 
                  value={manualName} 
                  onChange={e => setManualName(e.target.value)}
                  onKeyDown={e => e.key === 'Enter' && addManualPlayer()}
                  placeholder="Type player name..." 
                  autoFocus
                  style={{ flex:1, padding:'10px 14px', background:'var(--bg)', border:'1px solid var(--border2)', borderRadius:'var(--radius3)', color:'var(--text)', fontSize:'14px', outline:'none' }} 
                />
                <Btn onClick={addManualPlayer} disabled={!manualName.trim()} size="sm">Add</Btn>
              </div>
            )}

            {/* Search registered users */}
            <div style={{ position:'relative', marginBottom:'10px' }}>
              <I n="Search" s={15} c="var(--text3)" style={{ position:'absolute', left:'12px', top:'50%', transform:'translateY(-50%)', pointerEvents:'none' }} />
              <input 
                value={search} 
                onChange={e => setSearch(e.target.value)} 
                placeholder="Search registered players..." 
                style={{ width:'100%', padding:'11px 14px 11px 36px', background:'var(--surface)', border:'1px solid var(--border2)', borderRadius:'var(--radius2)', color:'var(--text)', fontSize:'14px', outline:'none' }} 
              />
            </div>

            {/* Selected chips */}
            {selected.length > 0 && (
              <div style={{ display:'flex', flexWrap:'wrap', gap:'6px', marginBottom:'10px' }}>
                {selected.map(u => (
                  <div key={u.oderId} onClick={() => removeSelected(u.oderId)} style={{ display:'flex', alignItems:'center', gap:'6px', background:'var(--accent3)', border:'1px solid rgba(74,222,128,0.4)', borderRadius:'20px', padding:'5px 10px 5px 8px', cursor:'pointer', fontSize:'13px', color:'var(--accent)', fontWeight:'600' }}>
                    {!u.isManual && <Avatar src={u.photoURL} name={u.firstName} size={20} />}
                    {u.isManual && <span style={{ width:'20px', height:'20px', borderRadius:'50%', background:'rgba(74,222,128,0.3)', display:'inline-flex', alignItems:'center', justifyContent:'center', fontSize:'10px' }}>✎</span>}
                    {u.isManual ? u.firstName : `${u.firstName} ${u.lastName}`.trim()}
                    <I n="X" s={12} c="var(--accent)" />
                  </div>
                ))}
              </div>
            )}

            {/* User list */}
            <div style={{ maxHeight:'180px', overflowY:'auto', borderRadius:'var(--radius2)', border:'1px solid var(--border)' }}>
              {filtered.length === 0 && search.length > 0 ? (
                <div style={{ padding:'16px', textAlign:'center', color:'var(--text3)', fontSize:'13px' }}>
                  No players found. Use "Add by name" above.
                </div>
              ) : (
                filtered.map(u => {
                  const isSelected = selected.some(s => s.oderId === u.oderId);
                  return (
                    <div key={u.oderId} onClick={() => toggle(u)} style={{ display:'flex', alignItems:'center', gap:'10px', padding:'10px 12px', borderBottom:'1px solid var(--border)', cursor:'pointer', background: isSelected ? 'var(--accent4)' : 'transparent', transition:'background 0.1s' }}>
                      <Avatar src={u.photoURL} name={`${u.firstName} ${u.lastName}`} size={34} />
                      <div style={{ flex:1 }}>
                        <div style={{ fontWeight:'600', fontSize:'14px' }}>{u.firstName} {u.lastName}</div>
                        {u.skillLevel && <div style={{ fontSize:'11px', color:'var(--text2)', textTransform:'capitalize' }}>{u.skillLevel}</div>}
                      </div>
                      {isSelected && <div style={{ width:'20px', height:'20px', borderRadius:'50%', background:'var(--accent)', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}><I n="Check" s={12} c="#050a14" /></div>}
                    </div>
                  );
                })
              )}
            </div>
          </div>

          <Btn onClick={startGame} disabled={loading} size="lg" icon="Zap" style={{ background:'var(--accent)', color:'#050a14' }}>
            {loading ? 'Starting...' : `Start Instant Game${selected.length > 0 ? ` · ${selected.length + 1} players` : ''}`}
          </Btn>
        </Modal>
      );
    }

    // ==================== EVENTS SCREEN ====================
    function EventsScreen({ onViewEvent, onCreateEvent }) {
      const [events, setEvents] = useState([]);
      const [loading, setLoading] = useState(true);
      const [filter, setFilter] = useState('upcoming');
      const { currentUser } = useAuth();

      useEffect(() => {
        const now = firebase.firestore.Timestamp.now();
        let q = db.collection('events').orderBy('dateTime');
        if (filter === 'upcoming') q = q.where('dateTime','>=',now);
        else if (filter === 'mine') q = q.where('hostId','==',currentUser.uid);
        return q.limit(30).onSnapshot(s => { setEvents(s.docs.map(d => ({ id:d.id, ...d.data() }))); setLoading(false); }, () => setLoading(false));
      }, [filter, currentUser]);

      const fmtDate = (ts) => {
        if (!ts) return '';
        const d = ts.toDate ? ts.toDate() : new Date(ts);
        const t = new Date(); const tm = new Date(t); tm.setDate(tm.getDate()+1);
        if (d.toDateString() === t.toDateString()) return 'Today';
        if (d.toDateString() === tm.toDateString()) return 'Tomorrow';
        return d.toLocaleDateString('en-US', {weekday:'short',month:'short',day:'numeric'});
      };

      const fmtTime = (ts) => {
        if (!ts) return '';
        const d = ts.toDate ? ts.toDate() : new Date(ts);
        return d.toLocaleTimeString('en-US', {hour:'numeric',minute:'2-digit'});
      };

      return (
        <div style={{ minHeight:'100vh', background:'var(--bg)', paddingBottom:'100px' }}>
          <div style={{ maxWidth:'500px', margin:'0 auto', padding:'24px 20px' }}>
            <PageHeader title="Games" right={<Btn onClick={onCreateEvent} size="sm" icon="Plus">New</Btn>} />
            <Tabs tabs={[{key:'upcoming',label:'Upcoming'},{key:'mine',label:'My Games'},{key:'past',label:'Past'}]} active={filter} onChange={setFilter} />
            {loading ? <div style={{ textAlign:'center', padding:'40px', color:'var(--text3)' }}>Loading...</div> :
              events.length === 0 ? <Empty icon="Calendar" title="No games found" sub="Create one and invite players" action={<Btn onClick={onCreateEvent} size="sm" icon="Plus">Create Game</Btn>} /> :
              events.map(e => {
                const going = (e.rsvps||[]).filter(r => r.status==='going');
                const userGoing = going.some(r => r.oderId === currentUser?.uid);
                return (
                  <Card key={e.id} onClick={() => onViewEvent(e.id)}>
                    <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:'12px' }}>
                      <div style={{ fontWeight:'700', fontSize:'16px', flex:1, marginRight:'8px' }}>{e.title}</div>
                      <div style={{ display:'flex', gap:'6px', flexShrink:0 }}>
                        {userGoing && <Badge color="green">Going</Badge>}
                        <Badge color={e.isPrivate ? 'amber' : 'blue'}>{e.isPrivate ? 'Private' : 'Open'}</Badge>
                      </div>
                    </div>
                    <div style={{ display:'flex', flexWrap:'wrap', gap:'12px', fontSize:'13px', color:'var(--text2)', marginBottom:'14px' }}>
                      <span style={{ display:'flex', alignItems:'center', gap:'5px' }}><I n="Calendar" s={13} c="var(--text3)" />{fmtDate(e.dateTime)}</span>
                      <span style={{ display:'flex', alignItems:'center', gap:'5px' }}><I n="Clock" s={13} c="var(--text3)" />{fmtTime(e.dateTime)}</span>
                      {e.location && <span style={{ display:'flex', alignItems:'center', gap:'5px' }}><I n="MapPin" s={13} c="var(--text3)" />{e.location.split(',')[0]}</span>}
                    </div>
                    <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
                      <div style={{ display:'flex', alignItems:'center', gap:'8px' }}>
                        <div style={{ display:'flex' }}>{going.slice(0,4).map((r,i) => <Avatar key={i} src={r.photoURL} name={r.firstName||r.userName} size={24} style={{ marginLeft: i>0 ? '-6px':0, border:'2px solid var(--bg)' }} />)}</div>
                        <span style={{ fontSize:'13px', color:'var(--text2)' }}><span style={{ color:'var(--text)', fontWeight:'700' }}>{going.length}</span>{e.maxPlayers ? `/${e.maxPlayers}` : ''} going</span>
                      </div>
                      <I n="ChevronRight" s={16} c="var(--text3)" />
                    </div>
                  </Card>
                );
              })
            }
          </div>
          <button onClick={onCreateEvent} style={{ position:'fixed', bottom:'88px', right:'20px', width:'52px', height:'52px', borderRadius:'50%', background:'var(--accent)', border:'none', color:'#050a14', fontSize:'24px', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', boxShadow:'0 4px 20px rgba(74,222,128,0.4)', zIndex:100 }}>
            <I n="Plus" s={22} c="#050a14" />
          </button>
        </div>
      );
    }

    // ==================== CREATE EVENT ====================
    function CreateEventScreen({ onBack, onCreated }) {
      const { currentUser, userProfile } = useAuth();
      const [saving, setSaving] = useState(false);
      const [error, setError] = useState('');
      const now = new Date(); now.setHours(now.getHours()+1, 0, 0, 0);
      const initHour = now.getHours() === 0 ? 12 : now.getHours() > 12 ? now.getHours()-12 : now.getHours();
      const [form, setForm] = useState({
        title:'', location:'', locationCoords:null, date:now,
        hour: initHour, minute: 0, ampm: now.getHours() >= 12 ? 'PM' : 'AM',
        isPrivate: true,
        hasMaxPlayers: false, maxPlayers: 8,
        allowWaitlist: true,
        coach: null,
        invitedPlayers: [],
        notes: ''
      });
      const [showDateTimePicker, setShowDateTimePicker] = useState(false);
      const [dateTimeInitialStep, setDateTimeInitialStep] = useState('date');
      const [coaches, setCoaches] = useState([]);
      const [showCoachPicker, setShowCoachPicker] = useState(false);
      const [coachSearch, setCoachSearch] = useState('');
      const [allUsers, setAllUsers] = useState([]);
      const [showInvitePicker, setShowInvitePicker] = useState(false);
      const [inviteSearch, setInviteSearch] = useState('');

      useEffect(() => {
        db.collection('users').where('roles','array-contains','coach').limit(50).get()
          .then(s => setCoaches(s.docs.map(d => ({id:d.id,...d.data()})))).catch(()=>{});
        db.collection('users').limit(100).get()
          .then(s => setAllUsers(s.docs.map(d => ({id:d.id,...d.data()})).filter(u => u.id !== currentUser?.uid))).catch(()=>{});
      }, []);

      const filteredCoaches = coachSearch.trim()
        ? coaches.filter(c => `${c.firstName} ${c.lastName}`.toLowerCase().includes(coachSearch.toLowerCase()))
        : coaches;

      const filteredUsers = inviteSearch.trim()
        ? allUsers.filter(u => `${u.firstName} ${u.lastName}`.toLowerCase().includes(inviteSearch.toLowerCase()))
        : allUsers;

      const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const fmtDate = (d) => {
        const t = new Date(), tm = new Date(t); tm.setDate(tm.getDate()+1);
        if(d.toDateString()===t.toDateString()) return 'Today';
        if(d.toDateString()===tm.toDateString()) return 'Tomorrow';
        return `${d.toLocaleDateString('en-US',{weekday:'short'})}, ${months[d.getMonth()]} ${d.getDate()}`;
      };
      const fmtTime = () => `${String(form.hour).padStart(2,'0')}:${String(form.minute).padStart(2,'0')} ${form.ampm}`;

      const getDateTime = () => {
        const d = new Date(form.date);
        let h = form.hour % 12;
        if (form.ampm === 'PM') h += 12;
        d.setHours(h, form.minute, 0, 0);
        return d;
      };

      const toggleInvite = (u) => {
        setForm(f => {
          const has = f.invitedPlayers.find(p => p.id === u.id);
          return {...f, invitedPlayers: has ? f.invitedPlayers.filter(p => p.id !== u.id) : [...f.invitedPlayers, u]};
        });
      };

      const handleSubmit = async () => {
        if (!form.title.trim()) { setError('Title is required'); return; }
        if (!form.location.trim()) { setError('Location is required'); return; }
        setSaving(true); setError('');
        try {
          const dateTime = getDateTime();
          const myRsvp = { oderId:currentUser.uid, userName:`${userProfile?.firstName||''} ${userProfile?.lastName||''}`.trim(), firstName:userProfile?.firstName||'', status:'going', isHost:true, photoURL:userProfile?.photoURL||'' };
          const inviteRsvps = form.invitedPlayers.map(u => ({ oderId:u.id, userName:`${u.firstName||''} ${u.lastName||''}`.trim(), firstName:u.firstName||'', status:'invited', photoURL:u.photoURL||'' }));
          const docRef = await db.collection('events').add({
            title: form.title.trim(), location: form.location.trim(), locationCoords: form.locationCoords,
            dateTime: firebase.firestore.Timestamp.fromDate(dateTime),
            maxPlayers: form.hasMaxPlayers ? form.maxPlayers : null,
            isPrivate: form.isPrivate, allowWaitlist: form.allowWaitlist,
            coachId: form.coach?.id||null, coachName: form.coach ? `${form.coach.firstName} ${form.coach.lastName}`.trim() : '',
            notes: form.notes.trim(),
            hostId: currentUser.uid, hostName:`${userProfile?.firstName||''} ${userProfile?.lastName||''}`.trim()||currentUser.email,
            hostPhotoURL: userProfile?.photoURL||'',
            rsvps: [myRsvp, ...inviteRsvps],
            waitlist: [],
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
          });
          onCreated(docRef.id);
        } catch(e) { setError('Failed to create game'); }
        finally { setSaving(false); }
      };

      // Reusable section label
      const SectionLabel = ({children}) => (
        <div style={{ fontSize:'12px', fontWeight:'700', color:'var(--text3)', letterSpacing:'0.07em', textTransform:'uppercase', marginBottom:'8px', marginTop:'4px' }}>{children}</div>
      );

      // accent color map (inline CSS vars don't concat well, use raw values)
      const accentColors = { amber:'#fbbf24', blue:'#60a5fa', green:'#4ade80', red:'#f87171' };

      // Reusable setting row with toggle
      const SettingRow = ({ icon, title, sub, on, onChange, accentKey }) => {
        const col = accentColors[accentKey] || '#ffffff';
        return (
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'14px 16px', background:'var(--surface)', border:`1px solid ${on ? col+'44' : 'rgba(255,255,255,0.07)'}`, borderRadius:'var(--radius2)', marginBottom:'10px', transition:'border-color 0.2s' }}>
            <div style={{ display:'flex', alignItems:'center', gap:'12px' }}>
              <div style={{ width:'36px', height:'36px', borderRadius:'10px', background: on ? col+'22' : '#1a2538', display:'flex', alignItems:'center', justifyContent:'center', transition:'background 0.2s' }}>
                <I n={icon} s={17} c={on ? col : '#4a5878'} />
              </div>
              <div>
                <div style={{ fontSize:'14px', fontWeight:'600', color:'#f0f4ff' }}>{title}</div>
                <div style={{ fontSize:'12px', color:'#8899bb', marginTop:'1px' }}>{sub}</div>
              </div>
            </div>
            <Toggle on={on} onChange={onChange} />
          </div>
        );
      };

      return (
        <div style={{ minHeight:'100vh', background:'var(--bg)', paddingBottom:'80px' }}>
          <div style={{ maxWidth:'500px', margin:'0 auto', padding:'24px 20px' }}>
            <PageHeader title="New Game" onBack={onBack} right={<Btn onClick={handleSubmit} disabled={saving} size="sm">{saving?'Saving...':'Save'}</Btn>} />
            {error && <div style={{ background:'rgba(248,113,113,0.1)', border:'1px solid rgba(248,113,113,0.3)', borderRadius:'var(--radius2)', padding:'12px 16px', marginBottom:'16px', color:'#f87171', fontSize:'14px' }}>{error}</div>}

            {/* ── BASICS ── */}
            <SectionLabel>Details</SectionLabel>
            <Input label="Title" value={form.title} onChange={e => setForm({...form,title:e.target.value})} placeholder="e.g. Sunday Doubles" />
            <LocationInput label="Location" value={form.location} onChange={(loc,coords) => setForm({...form,location:loc,locationCoords:coords})} placeholder="Search court or venue..." />

            {/* ── DATE & TIME ── */}
            <SectionLabel>Date & Time</SectionLabel>
            <div style={{ display:'flex', gap:'10px', marginBottom:'10px' }}>
              {/* Date button */}
              <div onClick={() => { setDateTimeInitialStep('date'); setShowDateTimePicker(true); }} style={{ flex:'1 1 55%', display:'flex', alignItems:'center', gap:'10px', padding:'13px 16px', background:'var(--surface)', border:'1px solid var(--border2)', borderRadius:'var(--radius2)', cursor:'pointer' }}>
                <I n="Calendar" s={17} c="var(--text3)" />
                <span style={{ fontSize:'14px', fontWeight:'500' }}>{fmtDate(form.date)}</span>
              </div>
              {/* Time button */}
              <div onClick={() => { setDateTimeInitialStep('time'); setShowDateTimePicker(true); }} style={{ flex:'1 1 45%', display:'flex', alignItems:'center', gap:'10px', padding:'13px 16px', background:'var(--surface)', border:'1px solid var(--border2)', borderRadius:'var(--radius2)', cursor:'pointer' }}>
                <I n="Clock" s={17} c="var(--text3)" />
                <span style={{ fontSize:'14px', fontWeight:'500' }}>{fmtTime()}</span>
              </div>
            </div>
            {/* Quick time chips */}
            <div style={{ display:'flex', gap:'6px', marginBottom:'20px', flexWrap:'wrap' }}>
              {[{l:'6 AM',h:6,m:0,a:'AM'},{l:'8 AM',h:8,m:0,a:'AM'},{l:'10 AM',h:10,m:0,a:'AM'},{l:'12 PM',h:12,m:0,a:'PM'},{l:'5 PM',h:5,m:0,a:'PM'},{l:'7 PM',h:7,m:0,a:'PM'},{l:'9 PM',h:9,m:0,a:'PM'}].map(t => {
                const active = form.hour===t.h && form.minute===t.m && form.ampm===t.a;
                return <button key={t.l} onClick={() => setForm(f=>({...f,hour:t.h,minute:t.m,ampm:t.a}))} style={{ padding:'6px 13px', borderRadius:'20px', border:`1px solid ${active?'var(--accent)':'var(--border)'}`, background:active?'var(--accent3)':'var(--surface)', color:active?'var(--accent)':'var(--text2)', fontSize:'12px', fontWeight:'600', cursor:'pointer', whiteSpace:'nowrap' }}>{t.l}</button>;
              })}
            </div>

            {/* ── COACH ── */}
            <SectionLabel>Coach (optional)</SectionLabel>
            <div style={{ marginBottom:'20px' }}>
              {form.coach ? (
                <div style={{ display:'flex', alignItems:'center', gap:'12px', padding:'12px 16px', background:'rgba(96,165,250,0.08)', border:'1px solid rgba(96,165,250,0.3)', borderRadius:'var(--radius2)' }}>
                  <Avatar src={form.coach.photoURL} name={`${form.coach.firstName} ${form.coach.lastName}`} size={40} />
                  <div style={{ flex:1 }}>
                    <div style={{ fontWeight:'700', fontSize:'14px' }}>{form.coach.firstName} {form.coach.lastName}</div>
                    <div style={{ fontSize:'12px', color:'#93c5fd' }}>{form.coach.coachProfile?.title||'Coach'}{form.coach.coachProfile?.rate?` · $${form.coach.coachProfile.rate}/hr`:''}</div>
                  </div>
                  <button onClick={() => setForm(f=>({...f,coach:null}))} style={{ background:'rgba(248,113,113,0.1)', border:'1px solid rgba(248,113,113,0.2)', borderRadius:'8px', padding:'6px 10px', color:'var(--red)', cursor:'pointer', fontSize:'12px', fontWeight:'600' }}>Remove</button>
                </div>
              ) : (
                <>
                  <div onClick={() => setShowCoachPicker(!showCoachPicker)} style={{ display:'flex', alignItems:'center', gap:'12px', padding:'13px 16px', background:'var(--surface)', border:'1px solid var(--border2)', borderRadius:showCoachPicker ? 'var(--radius2) var(--radius2) 0 0' : 'var(--radius2)', cursor:'pointer' }}>
                    <I n="Award" s={17} c="var(--text3)" />
                    <span style={{ fontSize:'14px', color:'var(--text3)', flex:1 }}>Assign a coach...</span>
                    <I n={showCoachPicker?'ChevronDown':'ChevronRight'} s={16} c="var(--text3)" />
                  </div>
                  {showCoachPicker && (
                    <div style={{ background:'var(--surface)', border:'1px solid var(--border2)', borderTop:'none', borderRadius:'0 0 var(--radius2) var(--radius2)', overflow:'hidden' }}>
                      <div style={{ padding:'10px 12px', borderBottom:'1px solid var(--border)', background:'var(--bg)' }}>
                        <input value={coachSearch} onChange={e=>setCoachSearch(e.target.value)} placeholder="Search coaches..." autoFocus style={{ width:'100%', background:'var(--surface)', border:'1px solid var(--border2)', borderRadius:'var(--radius3)', padding:'8px 12px', color:'var(--text)', fontSize:'14px', outline:'none' }} />
                      </div>
                      <div style={{ maxHeight:'200px', overflowY:'auto' }}>
                        {filteredCoaches.length===0 ? <div style={{ padding:'16px', textAlign:'center', color:'var(--text3)', fontSize:'13px' }}>{coaches.length===0?'No coaches on the platform yet':'No coaches found'}</div>
                          : filteredCoaches.map(c => (
                          <div key={c.id} onClick={() => { setForm(f=>({...f,coach:c})); setShowCoachPicker(false); setCoachSearch(''); }} style={{ display:'flex', alignItems:'center', gap:'12px', padding:'11px 16px', borderBottom:'1px solid var(--border)', cursor:'pointer' }}>
                            <Avatar src={c.photoURL} name={`${c.firstName} ${c.lastName}`} size={38} />
                            <div style={{ flex:1 }}>
                              <div style={{ fontWeight:'600', fontSize:'14px' }}>{c.firstName} {c.lastName}</div>
                              <div style={{ fontSize:'12px', color:'var(--text2)' }}>{c.coachProfile?.title||'Coach'}{c.coachProfile?.rate?` · $${c.coachProfile.rate}/hr`:''}</div>
                            </div>
                            <I n="ChevronRight" s={14} c="var(--text3)" />
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                </>
              )}
            </div>

            {/* ── INVITE PLAYERS ── */}
            <SectionLabel>Invite Players (optional)</SectionLabel>
            <div style={{ marginBottom:'20px' }}>
              {form.invitedPlayers.length > 0 && (
                <div style={{ display:'flex', flexWrap:'wrap', gap:'6px', marginBottom:'10px' }}>
                  {form.invitedPlayers.map(u => (
                    <div key={u.id} onClick={() => toggleInvite(u)} style={{ display:'flex', alignItems:'center', gap:'6px', background:'var(--accent3)', border:'1px solid rgba(74,222,128,0.35)', borderRadius:'20px', padding:'5px 10px 5px 7px', cursor:'pointer', fontSize:'13px', color:'var(--accent)', fontWeight:'600' }}>
                      <Avatar src={u.photoURL} name={`${u.firstName} ${u.lastName}`} size={20} />
                      {u.firstName} <I n="X" s={12} c="var(--accent)" />
                    </div>
                  ))}
                </div>
              )}
              <div onClick={() => setShowInvitePicker(!showInvitePicker)} style={{ display:'flex', alignItems:'center', gap:'12px', padding:'13px 16px', background:'var(--surface)', border:'1px solid var(--border2)', borderRadius:showInvitePicker?'var(--radius2) var(--radius2) 0 0':'var(--radius2)', cursor:'pointer' }}>
                <I n="Users" s={17} c="var(--text3)" />
                <span style={{ fontSize:'14px', color:'var(--text3)', flex:1 }}>{form.invitedPlayers.length>0 ? `${form.invitedPlayers.length} player${form.invitedPlayers.length>1?'s':''} invited` : 'Invite players...'}</span>
                <I n={showInvitePicker?'ChevronDown':'ChevronRight'} s={16} c="var(--text3)" />
              </div>
              {showInvitePicker && (
                <div style={{ background:'var(--surface)', border:'1px solid var(--border2)', borderTop:'none', borderRadius:'0 0 var(--radius2) var(--radius2)', overflow:'hidden' }}>
                  <div style={{ padding:'10px 12px', borderBottom:'1px solid var(--border)', background:'var(--bg)' }}>
                    <input value={inviteSearch} onChange={e=>setInviteSearch(e.target.value)} placeholder="Search players..." autoFocus style={{ width:'100%', background:'var(--surface)', border:'1px solid var(--border2)', borderRadius:'var(--radius3)', padding:'8px 12px', color:'var(--text)', fontSize:'14px', outline:'none' }} />
                  </div>
                  <div style={{ maxHeight:'220px', overflowY:'auto' }}>
                    {filteredUsers.length===0 ? <div style={{ padding:'16px', textAlign:'center', color:'var(--text3)', fontSize:'13px' }}>No players found</div>
                      : filteredUsers.slice(0,30).map(u => {
                        const invited = form.invitedPlayers.some(p => p.id===u.id);
                        return (
                          <div key={u.id} onClick={() => toggleInvite(u)} style={{ display:'flex', alignItems:'center', gap:'12px', padding:'11px 16px', borderBottom:'1px solid var(--border)', cursor:'pointer', background:invited?'var(--accent4)':'transparent' }}>
                            <Avatar src={u.photoURL} name={`${u.firstName} ${u.lastName}`} size={38} />
                            <div style={{ flex:1 }}>
                              <div style={{ fontWeight:'600', fontSize:'14px' }}>{u.firstName} {u.lastName}</div>
                              {u.skillLevel && <div style={{ fontSize:'12px', color:'var(--text2)', textTransform:'capitalize' }}>{u.skillLevel}</div>}
                            </div>
                            {invited
                              ? <div style={{ width:'22px', height:'22px', borderRadius:'50%', background:'var(--accent)', display:'flex', alignItems:'center', justifyContent:'center' }}><I n="Check" s={13} c="#050a14" /></div>
                              : <div style={{ width:'22px', height:'22px', borderRadius:'50%', border:'1px solid var(--border2)' }} />
                            }
                          </div>
                        );
                      })
                    }
                  </div>
                </div>
              )}
            </div>

            {/* ── SETTINGS ── */}
            <SectionLabel>Settings</SectionLabel>

            <SettingRow
              icon="Lock"
              title="Private Game"
              sub={form.isPrivate ? 'Invite only — players need approval' : 'Public — open to all players'}
              on={form.isPrivate}
              onChange={v => setForm({...form, isPrivate:v})}
              accentKey="amber"
            />

            <SettingRow
              icon="Users"
              title="Player Limit"
              sub={form.hasMaxPlayers ? `Max ${form.maxPlayers} players` : 'No limit'}
              on={form.hasMaxPlayers}
              onChange={v => setForm({...form, hasMaxPlayers:v})}
              accentKey="blue"
            />

            {/* Player count stepper — up to 30, 1 increment */}
            {form.hasMaxPlayers && (
              <div style={{ marginBottom:'10px', padding:'16px', background:'var(--surface)', border:'1px solid var(--border)', borderRadius:'var(--radius2)', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
                <div style={{ fontSize:'14px', color:'var(--text2)' }}>Max players</div>
                <div style={{ display:'flex', alignItems:'center', gap:'0' }}>
                  <button onClick={() => setForm(f=>({...f, maxPlayers:Math.max(2,f.maxPlayers-1)}))} style={{ width:'38px', height:'38px', borderRadius:'var(--radius3) 0 0 var(--radius3)', background:'var(--surface2)', border:'1px solid var(--border2)', color:'var(--text)', fontSize:'20px', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', fontWeight:'400' }}>−</button>
                  <div style={{ width:'52px', height:'38px', background:'var(--bg)', border:'1px solid var(--border2)', borderLeft:'none', borderRight:'none', display:'flex', alignItems:'center', justifyContent:'center', fontSize:'17px', fontWeight:'800', fontFamily:"'DM Mono',monospace" }}>{form.maxPlayers}</div>
                  <button onClick={() => setForm(f=>({...f, maxPlayers:Math.min(30,f.maxPlayers+1)}))} style={{ width:'38px', height:'38px', borderRadius:'0 var(--radius3) var(--radius3) 0', background:'var(--surface2)', border:'1px solid var(--border2)', color:'var(--text)', fontSize:'20px', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', fontWeight:'400' }}>+</button>
                </div>
              </div>
            )}

            <SettingRow
              icon="Bell"
              title="Waitlist"
              sub={form.allowWaitlist ? 'Full game? Players can queue up' : 'No waitlist — game closes when full'}
              on={form.allowWaitlist}
              onChange={v => setForm({...form, allowWaitlist:v})}
              accentKey="green"
            />

            {/* ── NOTES ── */}
            <Textarea label="Notes (optional)" value={form.notes} onChange={e => setForm({...form, notes:e.target.value})} placeholder="Any info for players..." style={{ minHeight:'80px', marginTop:'8px' }} />

            <Btn onClick={handleSubmit} disabled={saving} size="lg">{saving ? 'Creating...' : 'Create Game'}</Btn>
          </div>

          {/* ── DATE/TIME PICKER MODAL ── */}
          {showDateTimePicker && (
            <DateTimePickerModal
              date={form.date} hour={form.hour} minute={form.minute} ampm={form.ampm}
              initialStep={dateTimeInitialStep}
              onConfirm={(date, hour, minute, ampm) => { setForm(f=>({...f,date,hour,minute,ampm})); setShowDateTimePicker(false); }}
              onClose={() => setShowDateTimePicker(false)}
            />
          )}
        </div>
      );
    }

    // ==================== DATE+TIME PICKER MODAL ====================
    function DateTimePickerModal({ date, hour, minute, ampm, onConfirm, onClose, initialStep }) {
      const [step, setStep] = useState(initialStep || 'date');
      const [selDate, setSelDate] = useState(date || new Date());
      const [selHour, setSelHour] = useState(hour || 12);
      const [selMinute, setSelMinute] = useState(minute || 0);
      const [selAmpm, setSelAmpm] = useState(ampm || 'PM');
      const [calView, setCalView] = useState(new Date(selDate));
      const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      const shortMonths = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const days = ['S','M','T','W','T','F','S'];

      const getDays = d => new Date(d.getFullYear(),d.getMonth()+1,0).getDate();
      const getFirst = d => new Date(d.getFullYear(),d.getMonth(),1).getDay();
      const isToday = day => { const t=new Date(); return day===t.getDate()&&calView.getMonth()===t.getMonth()&&calView.getFullYear()===t.getFullYear(); };
      const isSel = day => day===selDate.getDate()&&calView.getMonth()===selDate.getMonth()&&calView.getFullYear()===selDate.getFullYear();
      const isPast = day => { const t=new Date(); t.setHours(0,0,0,0); return new Date(calView.getFullYear(),calView.getMonth(),day)<t; };
      const cells = []; for(let i=0;i<getFirst(calView);i++) cells.push(null); for(let i=1;i<=getDays(calView);i++) cells.push(i);

      const selDateStr = `${selDate.toLocaleDateString('en-US',{weekday:'short'})}, ${shortMonths[selDate.getMonth()]} ${selDate.getDate()}`;
      const selTimeStr = `${String(selHour).padStart(2,'0')}:${String(selMinute).padStart(2,'0')} ${selAmpm}`;

      return (
        <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.6)', backdropFilter:'blur(4px)', zIndex:5000, display:'flex', alignItems:'flex-end', justifyContent:'center' }}>
          <div style={{ width:'100%', maxWidth:'500px', background:'var(--bg2)', borderRadius:'24px 24px 0 0', overflow:'hidden', animation:'slideUpFull 0.3s ease-out' }}>
            {/* Header */}
            <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'20px 20px 0' }}>
              <button onClick={onClose} style={{ background:'var(--surface)', border:'none', borderRadius:'10px', padding:'8px 14px', color:'var(--text2)', fontSize:'14px', fontWeight:'600', cursor:'pointer' }}>Cancel</button>
              <div style={{ display:'flex', background:'var(--surface)', borderRadius:'10px', padding:'3px' }}>
                <button onClick={() => setStep('date')} style={{ padding:'7px 18px', borderRadius:'8px', background:step==='date'?'var(--accent)':'transparent', color:step==='date'?'#050a14':'var(--text2)', fontSize:'13px', fontWeight:'700', border:'none', cursor:'pointer', transition:'all 0.15s' }}>Date</button>
                <button onClick={() => setStep('time')} style={{ padding:'7px 18px', borderRadius:'8px', background:step==='time'?'var(--accent)':'transparent', color:step==='time'?'#050a14':'var(--text2)', fontSize:'13px', fontWeight:'700', border:'none', cursor:'pointer', transition:'all 0.15s' }}>Time</button>
              </div>
              <button onClick={() => onConfirm(selDate, selHour, selMinute, selAmpm)} style={{ background:'var(--accent)', border:'none', borderRadius:'10px', padding:'8px 16px', color:'#050a14', fontSize:'14px', fontWeight:'700', cursor:'pointer' }}>Done</button>
            </div>

            {/* Summary strip */}
            <div style={{ display:'flex', gap:'8px', padding:'16px 20px', borderBottom:'1px solid var(--border)' }}>
              <div onClick={() => setStep('date')} style={{ flex:1, padding:'10px 14px', background: step==='date' ? 'var(--accent3)' : 'var(--surface)', border:`1px solid ${step==='date'?'var(--accent)':'var(--border)'}`, borderRadius:'var(--radius2)', cursor:'pointer' }}>
                <div style={{ fontSize:'11px', color:'var(--text3)', fontWeight:'600', letterSpacing:'0.05em', textTransform:'uppercase', marginBottom:'3px' }}>Date</div>
                <div style={{ fontSize:'15px', fontWeight:'700', color: step==='date'?'var(--accent)':'var(--text)' }}>{selDateStr}</div>
              </div>
              <div onClick={() => setStep('time')} style={{ flex:1, padding:'10px 14px', background: step==='time' ? 'var(--accent3)' : 'var(--surface)', border:`1px solid ${step==='time'?'var(--accent)':'var(--border)'}`, borderRadius:'var(--radius2)', cursor:'pointer' }}>
                <div style={{ fontSize:'11px', color:'var(--text3)', fontWeight:'600', letterSpacing:'0.05em', textTransform:'uppercase', marginBottom:'3px' }}>Time</div>
                <div style={{ fontSize:'15px', fontWeight:'700', color: step==='time'?'var(--accent)':'var(--text)' }}>{selTimeStr}</div>
              </div>
            </div>

            {/* Date view */}
            {step === 'date' && (
              <div style={{ padding:'16px 20px 32px' }}>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'16px' }}>
                  <button onClick={() => setCalView(new Date(calView.getFullYear(),calView.getMonth()-1,1))} style={{ width:'36px', height:'36px', borderRadius:'10px', background:'var(--surface)', border:'1px solid var(--border)', display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer' }}><I n="ChevronLeft" s={16} c="var(--text2)" /></button>
                  <span style={{ fontWeight:'700', fontSize:'16px' }}>{months[calView.getMonth()]} {calView.getFullYear()}</span>
                  <button onClick={() => setCalView(new Date(calView.getFullYear(),calView.getMonth()+1,1))} style={{ width:'36px', height:'36px', borderRadius:'10px', background:'var(--surface)', border:'1px solid var(--border)', display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer' }}><I n="ChevronRight" s={16} c="var(--text2)" /></button>
                </div>
                <div style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:'2px', marginBottom:'4px' }}>
                  {days.map((d,i) => <div key={i} style={{ textAlign:'center', fontSize:'11px', color:'var(--text3)', padding:'6px 2px', fontWeight:'700', letterSpacing:'0.03em' }}>{d}</div>)}
                </div>
                <div style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:'4px' }}>
                  {cells.map((day,i) => (
                    <div key={i} onClick={() => { if(day&&!isPast(day)) { const nd=new Date(calView.getFullYear(),calView.getMonth(),day); setSelDate(nd); setStep('time'); } }}
                      style={{ aspectRatio:'1', display:'flex', alignItems:'center', justifyContent:'center', borderRadius:'50%', fontSize:'14px', fontWeight:isSel(day)?'800':'500', cursor:day&&!isPast(day)?'pointer':'default', background:isSel(day)?'var(--accent)':isToday(day)?'var(--accent3)':'transparent', color:!day?'transparent':isPast(day)?'var(--text3)':isSel(day)?'#050a14':'var(--text)', border:isToday(day)&&!isSel(day)?'1px solid var(--accent)':'none', transition:'background 0.1s' }}>
                      {day}
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* Time view */}
            {step === 'time' && (
              <div style={{ padding:'24px 20px 40px' }}>
                {/* Quick presets */}
                <div style={{ display:'flex', gap:'6px', marginBottom:'24px', flexWrap:'wrap' }}>
                  {[{l:'6 AM',h:6,m:0,a:'AM'},{l:'7 AM',h:7,m:0,a:'AM'},{l:'8 AM',h:8,m:0,a:'AM'},{l:'9 AM',h:9,m:0,a:'AM'},{l:'10 AM',h:10,m:0,a:'AM'},{l:'12 PM',h:12,m:0,a:'PM'},{l:'2 PM',h:2,m:0,a:'PM'},{l:'4 PM',h:4,m:0,a:'PM'},{l:'5 PM',h:5,m:0,a:'PM'},{l:'6 PM',h:6,m:0,a:'PM'},{l:'7 PM',h:7,m:0,a:'PM'},{l:'8 PM',h:8,m:0,a:'PM'},{l:'9 PM',h:9,m:0,a:'PM'}].map(t => {
                    const active = selHour===t.h&&selMinute===t.m&&selAmpm===t.a;
                    return <button key={t.l} onClick={()=>{setSelHour(t.h);setSelMinute(t.m);setSelAmpm(t.a);}} style={{ padding:'7px 13px', borderRadius:'20px', border:`1px solid ${active?'var(--accent)':'var(--border)'}`, background:active?'var(--accent3)':'var(--surface)', color:active?'var(--accent)':'var(--text2)', fontSize:'13px', fontWeight:'600', cursor:'pointer', whiteSpace:'nowrap', transition:'all 0.1s' }}>{t.l}</button>;
                  })}
                </div>

                {/* Drum roller */}
                <div style={{ display:'flex', alignItems:'center', justifyContent:'center', gap:'8px', padding:'16px', background:'var(--surface)', borderRadius:'var(--radius)', border:'1px solid var(--border)' }}>
                  {/* Hour column */}
                  <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:'4px' }}>
                    <button onClick={()=>setSelHour(h=>h===12?1:h+1)} style={{ width:'44px', height:'36px', background:'var(--surface2)', border:'1px solid var(--border)', borderRadius:'var(--radius3)', color:'var(--text2)', fontSize:'16px', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}>▲</button>
                    <div style={{ width:'64px', height:'56px', display:'flex', alignItems:'center', justifyContent:'center', fontSize:'32px', fontWeight:'900', fontFamily:"'DM Mono',monospace", color:'var(--text)' }}>{String(selHour).padStart(2,'0')}</div>
                    <button onClick={()=>setSelHour(h=>h===1?12:h-1)} style={{ width:'44px', height:'36px', background:'var(--surface2)', border:'1px solid var(--border)', borderRadius:'var(--radius3)', color:'var(--text2)', fontSize:'16px', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}>▼</button>
                    <div style={{ fontSize:'11px', color:'var(--text3)', fontWeight:'600', letterSpacing:'0.05em', textTransform:'uppercase', marginTop:'2px' }}>Hour</div>
                  </div>

                  <div style={{ fontSize:'32px', fontWeight:'900', color:'var(--text3)', marginBottom:'24px', paddingTop:'4px' }}>:</div>

                  {/* Minute column — 15-min increments */}
                  <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:'4px' }}>
                    <button onClick={()=>setSelMinute(m=>m===45?0:m+15)} style={{ width:'44px', height:'36px', background:'var(--surface2)', border:'1px solid var(--border)', borderRadius:'var(--radius3)', color:'var(--text2)', fontSize:'16px', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}>▲</button>
                    <div style={{ width:'64px', height:'56px', display:'flex', alignItems:'center', justifyContent:'center', fontSize:'32px', fontWeight:'900', fontFamily:"'DM Mono',monospace", color:'var(--text)' }}>{String(selMinute).padStart(2,'0')}</div>
                    <button onClick={()=>setSelMinute(m=>m===0?45:m-15)} style={{ width:'44px', height:'36px', background:'var(--surface2)', border:'1px solid var(--border)', borderRadius:'var(--radius3)', color:'var(--text2)', fontSize:'16px', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}>▼</button>
                    <div style={{ fontSize:'11px', color:'var(--text3)', fontWeight:'600', letterSpacing:'0.05em', textTransform:'uppercase', marginTop:'2px' }}>Min</div>
                  </div>

                  {/* AM / PM column */}
                  <div style={{ display:'flex', flexDirection:'column', gap:'8px', marginLeft:'8px' }}>
                    {['AM','PM'].map(p => (
                      <button key={p} onClick={()=>setSelAmpm(p)} style={{ width:'56px', padding:'14px 8px', borderRadius:'var(--radius2)', background:selAmpm===p?'var(--accent)':'var(--surface2)', border:`1px solid ${selAmpm===p?'var(--accent)':'var(--border)'}`, color:selAmpm===p?'#050a14':'var(--text2)', fontSize:'14px', fontWeight:'800', cursor:'pointer', transition:'all 0.15s' }}>{p}</button>
                    ))}
                  </div>
                </div>

                {/* Minute quick-select */}
                <div style={{ display:'flex', gap:'8px', marginTop:'12px', justifyContent:'center' }}>
                  {[0,15,30,45].map(m => (
                    <button key={m} onClick={()=>setSelMinute(m)} style={{ flex:1, padding:'10px', borderRadius:'var(--radius3)', border:`1px solid ${selMinute===m?'var(--accent)':'var(--border)'}`, background:selMinute===m?'var(--accent3)':'var(--surface)', color:selMinute===m?'var(--accent)':'var(--text2)', fontSize:'14px', fontWeight:'700', cursor:'pointer', fontFamily:"'DM Mono',monospace" }}>:{String(m).padStart(2,'0')}</button>
                  ))}
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    function CalendarModal({ selected, onSelect, onClose }) {
      const [view, setView] = useState(selected || new Date());
      const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      const days = ['S','M','T','W','T','F','S'];
      const getDays = (d) => new Date(d.getFullYear(), d.getMonth()+1, 0).getDate();
      const getFirst = (d) => new Date(d.getFullYear(), d.getMonth(), 1).getDay();
      const isToday = (day) => { const t = new Date(); return day===t.getDate() && view.getMonth()===t.getMonth() && view.getFullYear()===t.getFullYear(); };
      const isSel = (day) => selected && day===selected.getDate() && view.getMonth()===selected.getMonth() && view.getFullYear()===selected.getFullYear();
      const isPast = (day) => { const t = new Date(); t.setHours(0,0,0,0); return new Date(view.getFullYear(), view.getMonth(), day) < t; };
      const cells = []; for(let i=0;i<getFirst(view);i++) cells.push(null); for(let i=1;i<=getDays(view);i++) cells.push(i);
      return (
        <Modal onClose={onClose} title={`${months[view.getMonth()]} ${view.getFullYear()}`}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'20px' }}>
            <Btn onClick={() => setView(new Date(view.getFullYear(), view.getMonth()-1, 1))} variant="secondary" size="sm"><I n="ChevronLeft" s={16} c="currentColor" /></Btn>
            <span style={{ fontWeight:'600' }}>{months[view.getMonth()]} {view.getFullYear()}</span>
            <Btn onClick={() => setView(new Date(view.getFullYear(), view.getMonth()+1, 1))} variant="secondary" size="sm"><I n="ChevronRight" s={16} c="currentColor" /></Btn>
          </div>
          <div style={{ display:'grid', gridTemplateColumns:'repeat(7, 1fr)', gap:'4px', marginBottom:'8px' }}>
            {days.map((d,i) => <div key={i} style={{ textAlign:'center', fontSize:'12px', color:'var(--text3)', padding:'6px', fontWeight:'600' }}>{d}</div>)}
          </div>
          <div style={{ display:'grid', gridTemplateColumns:'repeat(7, 1fr)', gap:'4px' }}>
            {cells.map((day,i) => (
              <div key={i} onClick={() => { if(day && !isPast(day)) { const nd = new Date(view.getFullYear(),view.getMonth(),day,selected?.getHours()||12,selected?.getMinutes()||0); onSelect(nd); onClose(); } }} style={{ aspectRatio:'1', display:'flex', alignItems:'center', justifyContent:'center', borderRadius:'10px', fontSize:'14px', fontWeight:'500', cursor: day && !isPast(day) ? 'pointer' : 'default', background: isSel(day) ? 'var(--accent)' : isToday(day) ? 'var(--accent3)' : 'transparent', color: day ? (isPast(day) ? 'var(--text3)' : isSel(day) ? '#050a14' : 'var(--text)') : 'transparent', border: isToday(day) && !isSel(day) ? '1px solid var(--accent)' : 'none' }}>{day}</div>
            ))}
          </div>
        </Modal>
      );
    }

    // ==================== EVENT DETAIL ====================
    function EventDetailScreen({ eventId, onBack, onStartGame }) {
      const { currentUser, userProfile } = useAuth();
      const [event, setEvent] = useState(null);
      const [loading, setLoading] = useState(true);
      const [tab, setTab] = useState('info');
      const [chatMessages, setChatMessages] = useState([]);
      const [chatText, setChatText] = useState('');
      const [sendingChat, setSendingChat] = useState(false);
      const chatBottomRef = useRef(null);

      useEffect(() => {
        return db.collection('events').doc(eventId).onSnapshot(s => {
          setEvent(s.exists ? {id:s.id,...s.data()} : null);
          setLoading(false);
        });
      }, [eventId]);

      useEffect(() => {
        if (!eventId) return;
        return db.collection('events').doc(eventId).collection('messages')
          .orderBy('createdAt', 'asc').limit(150)
          .onSnapshot(s => setChatMessages(s.docs.map(d => ({id:d.id,...d.data()}))), () => {});
      }, [eventId]);

      useEffect(() => {
        if (tab === 'chat') setTimeout(() => chatBottomRef.current?.scrollIntoView({ behavior:'smooth' }), 100);
      }, [chatMessages.length, tab]);

      const sendChat = async () => {
        const text = chatText.trim();
        if (!text || !currentUser) return;
        setSendingChat(true);
        setChatText('');
        try {
          await db.collection('events').doc(eventId).collection('messages').add({
            text,
            authorId: currentUser.uid,
            authorName: `${userProfile?.firstName||''} ${userProfile?.lastName||''}`.trim() || 'Player',
            authorPhoto: userProfile?.photoURL || '',
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
          });
        } catch(e) {} finally { setSendingChat(false); }
      };

      const handleRSVP = async (action) => {
        if (!currentUser || !event) return;
        const rsvps = event.rsvps || [];
        const waitlist = event.waitlist || [];
        const myInfo = {
          oderId: currentUser.uid,
          userName: `${userProfile?.firstName||''} ${userProfile?.lastName||''}`.trim(),
          firstName: userProfile?.firstName || '',
          photoURL: userProfile?.photoURL || ''
        };
        if (action === 'join') {
          const exists = rsvps.findIndex(r => r.oderId === currentUser.uid);
          let newRsvps = exists >= 0
            ? rsvps.map((r,i) => i===exists ? {...r, status:'going'} : r)
            : [...rsvps, {...myInfo, status:'going', isHost:false}];
          const newWait = waitlist.filter(r => r.oderId !== currentUser.uid);
          await db.collection('events').doc(eventId).update({ rsvps: newRsvps, waitlist: newWait });
        } else if (action === 'waitlist') {
          if (waitlist.some(r => r.oderId === currentUser.uid)) return;
          await db.collection('events').doc(eventId).update({ waitlist: [...waitlist, {...myInfo, requestedAt: new Date().toISOString()}] });
        } else if (action === 'leave') {
          await db.collection('events').doc(eventId).update({
            rsvps: rsvps.filter(r => r.oderId !== currentUser.uid),
            waitlist: waitlist.filter(r => r.oderId !== currentUser.uid)
          });
        }
      };

      const approveWaitlist = async (uid) => {
        const person = (event.waitlist||[]).find(r => r.oderId === uid);
        if (!person) return;
        await db.collection('events').doc(eventId).update({
          waitlist: (event.waitlist||[]).filter(r => r.oderId !== uid),
          rsvps: [...(event.rsvps||[]), {...person, status:'going', isHost:false}]
        });
      };

      const denyWaitlist = async (uid) => {
        await db.collection('events').doc(eventId).update({
          waitlist: (event.waitlist||[]).filter(r => r.oderId !== uid)
        });
      };

      if (loading) return <div style={{ minHeight:'100vh', background:'var(--bg)', display:'flex', alignItems:'center', justifyContent:'center', color:'var(--text3)' }}>Loading...</div>;
      if (!event) return <div style={{ minHeight:'100vh', background:'var(--bg)', display:'flex', alignItems:'center', justifyContent:'center' }}><Btn onClick={onBack} variant="secondary">Go Back</Btn></div>;

      const going = (event.rsvps||[]).filter(r => r.status === 'going');
      const waitlist = event.waitlist || [];
      const isGoing = going.some(r => r.oderId === currentUser?.uid);
      const isOnWaitlist = waitlist.some(r => r.oderId === currentUser?.uid);
      const isHost = event.hostId === currentUser?.uid;
      const isFull = !!(event.maxPlayers && going.length >= event.maxPlayers && !isGoing);
      const d = event.dateTime?.toDate ? event.dateTime.toDate() : new Date(event.dateTime||Date.now());

      const fmtMsgTime = (ts) => {
        if (!ts) return '';
        const d2 = ts.toDate ? ts.toDate() : new Date(ts);
        return d2.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit'});
      };

      const waitlistTabLabel = isHost && waitlist.length > 0 ? `Waitlist (${waitlist.length})` : null;
      const tabs = [
        {key:'info', label:'Info'},
        {key:'players', label:`Players (${going.length})`},
        {key:'chat', label:`Chat${chatMessages.length > 0 ? ` ·${chatMessages.length}` : ''}`},
        ...(waitlistTabLabel ? [{key:'waitlist', label:waitlistTabLabel}] : [])
      ];

      return (
        <div style={{ minHeight:'100vh', background:'var(--bg)', display:'flex', flexDirection:'column' }}>
          {/* Sticky header area */}
          <div style={{ maxWidth:'500px', margin:'0 auto', width:'100%', padding:'24px 20px 0', flexShrink:0 }}>
            <PageHeader onBack={onBack} title="" right={
              <div style={{ display:'flex', gap:'8px' }}>
                {isHost && <Btn onClick={() => onStartGame(event)} size="sm" icon="Zap">Start</Btn>}
                <Btn onClick={() => navigator.share?.({title:event.title,url:window.location.href})} variant="ghost" size="sm"><I n="Share" s={16} c="currentColor" /></Btn>
              </div>
            } />

            {/* Hero */}
            <div style={{ textAlign:'center', marginBottom:'20px' }}>
              <div style={{ display:'flex', justifyContent:'center', gap:'6px', marginBottom:'10px', flexWrap:'wrap' }}>
                <Badge color={event.isPrivate ? 'amber' : 'blue'}>{event.isPrivate ? 'Private' : 'Open'}</Badge>
                {isFull && !isGoing && <Badge color="red">Full</Badge>}
                {waitlist.length > 0 && isHost && <Badge color="purple">{waitlist.length} waiting</Badge>}
              </div>
              <h2 style={{ fontSize:'24px', fontWeight:'800', letterSpacing:'-0.03em', margin:'0 0 12px' }}>{event.title}</h2>
              <div style={{ display:'flex', flexWrap:'wrap', gap:'10px', justifyContent:'center', fontSize:'13px', color:'var(--text2)', marginBottom:'12px' }}>
                <span style={{ display:'flex', alignItems:'center', gap:'5px' }}><I n="Calendar" s={13} c="var(--text3)" />{d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}</span>
                <span style={{ display:'flex', alignItems:'center', gap:'5px' }}><I n="Clock" s={13} c="var(--text3)" />{d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}</span>
                {event.location && <span style={{ display:'flex', alignItems:'center', gap:'5px' }}><I n="MapPin" s={13} c="var(--text3)" />{event.location.split(',')[0]}</span>}
              </div>
              {/* Host & Coach pills */}
              <div style={{ display:'flex', flexWrap:'wrap', justifyContent:'center', gap:'8px' }}>
                {event.hostName && (
                  <div style={{ display:'inline-flex', alignItems:'center', gap:'7px', padding:'6px 12px', background:'var(--surface)', borderRadius:'20px', border:'1px solid var(--border)', fontSize:'12px', color:'var(--text2)' }}>
                    <Avatar src={event.hostPhotoURL} name={event.hostName} size={22} />
                    Hosted by <strong style={{ color:'var(--text)' }}>{event.hostName.split(' ')[0]}</strong>
                  </div>
                )}
                {event.coachName && (
                  <div style={{ display:'inline-flex', alignItems:'center', gap:'7px', padding:'6px 12px', background:'rgba(96,165,250,0.1)', borderRadius:'20px', border:'1px solid rgba(96,165,250,0.25)', fontSize:'12px', color:'#93c5fd' }}>
                    <I n="Award" s={13} c="#93c5fd" />
                    Coach: <strong>{event.coachName}</strong>
                  </div>
                )}
              </div>
            </div>

            {/* RSVP Area */}
            <div style={{ marginBottom:'16px' }}>
              {!isHost && !isGoing && !isOnWaitlist && (
                isFull
                  ? (event.allowWaitlist !== false
                    ? <Btn onClick={() => handleRSVP('waitlist')} variant="secondary" size="lg" style={{ width:'100%' }} icon="Bell">Join Waitlist</Btn>
                    : <div style={{ width:'100%', padding:'14px', borderRadius:'var(--radius)', background:'rgba(248,113,113,0.08)', border:'1px solid rgba(248,113,113,0.3)', color:'var(--red)', fontWeight:'600', fontSize:'14px', textAlign:'center' }}>Game is full — no waitlist</div>)
                  : <button onClick={() => handleRSVP('join')} style={{ width:'100%', padding:'16px', borderRadius:'var(--radius)', background:'var(--accent)', color:'#050a14', fontWeight:'700', fontSize:'16px', cursor:'pointer', border:'none' }}>✓ Join Game</button>
              )}
              {!isHost && isGoing && (
                <button onClick={() => handleRSVP('join')} style={{ width:'100%', padding:'16px', borderRadius:'var(--radius)', background:'var(--accent)', color:'#050a14', fontWeight:'700', fontSize:'16px', cursor:'pointer', border:'none', display:'flex', alignItems:'center', justifyContent:'center', gap:'8px' }}>
                  <I n="Check" s={18} c="#050a14" /> You're Going!
                </button>
              )}
              {!isHost && isOnWaitlist && (
                <div style={{ width:'100%', padding:'14px', borderRadius:'var(--radius)', background:'rgba(167,139,250,0.1)', border:'1px solid rgba(167,139,250,0.3)', color:'#c4b5fd', fontWeight:'600', fontSize:'14px', textAlign:'center' }}>
                  ⏳ On Waitlist — pending host approval
                </div>
              )}
              {(isGoing || isOnWaitlist) && !isHost && (
                <button onClick={() => handleRSVP('leave')} style={{ width:'100%', padding:'10px', background:'none', border:'none', color:'var(--text3)', fontSize:'13px', cursor:'pointer', marginTop:'6px' }}>Can't make it anymore</button>
              )}
            </div>

            <Tabs tabs={tabs} active={tab} onChange={setTab} />
          </div>

          {/* ---- INFO TAB ---- */}
          {tab === 'info' && (
            <div style={{ maxWidth:'500px', margin:'0 auto', width:'100%', padding:'0 20px 80px', flex:1 }}>
              <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:'10px', marginBottom:'16px' }}>
                {[
                  {label:'Players', value:`${going.length}${event.maxPlayers?'/'+event.maxPlayers:''}`},
                  {label:'Messages', value:chatMessages.length},
                  {label:'Waitlist', value:waitlist.length},
                ].map(s => (
                  <div key={s.label} style={{ background:'var(--surface)', border:'1px solid var(--border)', borderRadius:'var(--radius2)', padding:'14px', textAlign:'center' }}>
                    <div style={{ fontWeight:'800', fontSize:'20px' }}>{s.value}</div>
                    <div style={{ fontSize:'11px', color:'var(--text2)', marginTop:'2px' }}>{s.label}</div>
                  </div>
                ))}
              </div>
              {event.notes && (
                <Card>
                  <div style={{ fontSize:'12px', fontWeight:'600', color:'var(--text2)', textTransform:'uppercase', letterSpacing:'0.06em', marginBottom:'8px' }}>Notes</div>
                  <p style={{ margin:0, fontSize:'14px', lineHeight:'1.6' }}>{event.notes}</p>
                </Card>
              )}
            </div>
          )}

          {/* ---- PLAYERS TAB ---- */}
          {tab === 'players' && (
            <div style={{ maxWidth:'500px', margin:'0 auto', width:'100%', padding:'0 20px 80px', flex:1 }}>
              <Card>
                <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:'14px' }}>
                  <div style={{ fontWeight:'700', fontSize:'15px' }}>Going</div>
                  <Badge color={isFull ? 'red' : 'green'}>{going.length}{event.maxPlayers ? `/${event.maxPlayers}` : ''}</Badge>
                </div>
                {going.length === 0
                  ? <div style={{ textAlign:'center', padding:'20px', color:'var(--text3)', fontSize:'14px' }}>Be the first to join!</div>
                  : going.map((p, i) => {
                    const isMe = p.oderId === currentUser?.uid;
                    return (
                      <div key={i} style={{ display:'flex', alignItems:'center', gap:'12px', padding:'10px 0', borderBottom: i < going.length-1 ? '1px solid var(--border)' : 'none' }}>
                        <Avatar src={p.photoURL} name={p.firstName||p.userName} size={46} />
                        <div style={{ flex:1 }}>
                          <div style={{ fontWeight:'600', fontSize:'14px' }}>
                            {p.firstName||p.userName?.split(' ')[0]}
                            {isMe && <span style={{ color:'var(--text3)', fontWeight:'400', fontSize:'12px' }}> · you</span>}
                          </div>
                          {p.isHost && <span style={{ fontSize:'11px', color:'var(--accent)', fontWeight:'600' }}>Host</span>}
                        </div>
                        {isMe && <I n="Check" s={16} c="var(--accent)" />}
                      </div>
                    );
                  })
                }
              </Card>
            </div>
          )}

          {/* ---- CHAT TAB ---- */}
          {tab === 'chat' && (
            <div style={{ maxWidth:'500px', margin:'0 auto', width:'100%', display:'flex', flexDirection:'column', flex:1, minHeight:0, height:'calc(100vh - 360px)' }}>
              <div style={{ flex:1, overflowY:'auto', padding:'16px 20px', display:'flex', flexDirection:'column', gap:'10px' }}>
                {chatMessages.length === 0 && (
                  <div style={{ textAlign:'center', padding:'40px 20px', color:'var(--text3)', display:'flex', flexDirection:'column', alignItems:'center', gap:'10px' }}>
                    <I n="MessageCircle" s={40} c="var(--border2)" />
                    <div style={{ fontSize:'15px', fontWeight:'600' }}>No messages yet</div>
                    <div style={{ fontSize:'13px' }}>Start the conversation!</div>
                  </div>
                )}
                {chatMessages.map((msg, i) => {
                  const isMe = msg.authorId === currentUser?.uid;
                  const prev = chatMessages[i-1];
                  const samePrev = prev && prev.authorId === msg.authorId;
                  return (
                    <div key={msg.id} style={{ display:'flex', flexDirection:isMe?'row-reverse':'row', gap:'8px', alignItems:'flex-end' }}>
                      {!isMe && !samePrev && <Avatar src={msg.authorPhoto} name={msg.authorName} size={28} style={{ flexShrink:0 }} />}
                      {!isMe && samePrev && <div style={{ width:'28px', flexShrink:0 }} />}
                      <div style={{ maxWidth:'74%' }}>
                        {!isMe && !samePrev && <div style={{ fontSize:'11px', color:'var(--text3)', marginBottom:'3px', marginLeft:'4px', fontWeight:'600' }}>{msg.authorName?.split(' ')[0]}</div>}
                        <div style={{ padding:'10px 14px', borderRadius:isMe?'16px 16px 4px 16px':'16px 16px 16px 4px', background:isMe?'var(--accent)':'var(--surface2)', color:isMe?'#050a14':'var(--text)', fontSize:'14px', lineHeight:'1.45', wordBreak:'break-word' }}>
                          {msg.text}
                        </div>
                        <div style={{ fontSize:'10px', color:'var(--text3)', marginTop:'3px', textAlign:isMe?'right':'left', paddingLeft:isMe?0:'4px', paddingRight:isMe?'4px':0 }}>
                          {fmtMsgTime(msg.createdAt)}
                        </div>
                      </div>
                    </div>
                  );
                })}
                <div ref={chatBottomRef} />
              </div>
              {/* Input bar */}
              <div style={{ padding:'10px 16px', background:'var(--bg2)', borderTop:'1px solid var(--border)', display:'flex', gap:'10px', alignItems:'center', paddingBottom:'max(12px, env(safe-area-inset-bottom))' }}>
                <div style={{ flex:1, background:'var(--surface)', borderRadius:'24px', border:'1px solid var(--border2)', padding:'10px 16px', display:'flex', alignItems:'center' }}>
                  <input
