<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Tennisverse">
  <meta name="theme-color" content="#050a14">
  <title>Tennisverse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg: #050a14;
      --bg2: #0a1120;
      --bg3: #111825;
      --surface: #141e2e;
      --surface2: #1a2538;
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.12);
      --text: #f0f4ff;
      --text2: #8899bb;
      --text3: #4a5878;
      --accent: #4ade80;
      --accent2: #22c55e;
      --accent3: rgba(74,222,128,0.12);
      --accent4: rgba(74,222,128,0.06);
      --red: #f87171;
      --amber: #fbbf24;
      --blue: #60a5fa;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
      --shadow2: 0 1px 3px rgba(0,0,0,0.3);
      --radius: 16px;
      --radius2: 12px;
      --radius3: 8px;
    }
    body {
      margin: 0; padding: 0;
      font-family: 'DM Sans', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }
    input, button, select, textarea { font-family: inherit; }
    input[type="range"] { -webkit-appearance: none; width: 100%; height: 4px; border-radius: 2px; background: var(--surface2); outline: none; }
    input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%; background: var(--accent); cursor: pointer; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 2px; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideUpFull { from { opacity: 0; transform: translateY(100%); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
    @keyframes pulseBig { 0%,100% { transform:scale(1); } 50% { transform:scale(1.06); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes confettiFall { 0% { transform: translateY(0) rotate(0deg); opacity:1; } 100% { transform: translateY(100vh) rotate(720deg); opacity:0; } }
    @keyframes popIn { 0% { transform:scale(0.4); opacity:0; } 70% { transform:scale(1.12); } 100% { transform:scale(1); opacity:1; } }
    @keyframes kingPulse { 0%,100% { box-shadow:0 0 0 0 rgba(74,222,128,0); } 50% { box-shadow:0 0 0 6px rgba(74,222,128,0.15); } }
    .animate-in { animation: slideUp 0.25s ease-out; }
    .pac-container { 
      background: var(--surface) !important; 
      border-radius: var(--radius2) !important; 
      margin-top: 6px !important; 
      z-index: 99999 !important; 
      border: 1px solid var(--border2) !important;
      box-shadow: var(--shadow) !important;
      font-family: 'DM Sans', sans-serif !important;
    }
    .pac-item { 
      background: var(--surface) !important; 
      color: var(--text) !important; 
      padding: 12px 16px !important; 
      border-top: 1px solid var(--border) !important; 
      cursor: pointer !important;
      font-size: 14px !important;
    }
    .pac-item:first-child { border-top: none !important; border-radius: var(--radius2) var(--radius2) 0 0 !important; }
    .pac-item:last-child { border-radius: 0 0 var(--radius2) var(--radius2) !important; }
    .pac-item:hover, .pac-item-selected { background: var(--surface2) !important; }
    .pac-item-query { color: var(--text) !important; font-weight: 600 !important; }
    .pac-matched { color: var(--accent) !important; font-weight: 700 !important; }
    .pac-icon, .pac-icon-marker { display: none !important; }
    .pac-item span { color: var(--text2) !important; }
    .pac-item span.pac-item-query { color: var(--text) !important; }
    .pac-item span.pac-matched { color: var(--accent) !important; }
  </style>
</head>

  <script>
    window.onerror = function(msg, src, line, col, err) {
      console.error('App error:', msg, src, line);
      var r = document.getElementById('root');
      if (r) {
        var stack = err && err.stack ? err.stack : '';
        r.innerHTML = '<div style="padding:20px;font-family:monospace;font-size:12px;background:#050a14;color:#f87171;min-height:100vh"><b style=\"font-size:16px\">App Error</b><br><br>' + 
          '<div style=\"color:#fbbf24;margin-bottom:8px\">' + msg + '</div>' +
          '<div style=\"color:#888;font-size:11px;margin-bottom:12px\">' + (src||'') + ':' + line + ':' + (col||0) + '</div>' +
          (stack ? '<pre style=\"font-size:10px;color:#60a5fa;white-space:pre-wrap;word-break:break-all;background:#0a1120;padding:12px;border-radius:8px\">' + stack.replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</pre>' : '') +
          '</div>';
      }
      return false;
    };
    window.addEventListener('unhandledrejection', function(e) {
      console.error('Unhandled promise rejection:', e.reason);
    });
  </script>
