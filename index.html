                    value={chatText}
                    onChange={e => setChatText(e.target.value)}
                    onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }}}
                    placeholder="Message..."
                    style={{ flex:1, background:'transparent', border:'none', color:'var(--text)', fontSize:'14px', outline:'none' }}
                  />
                </div>
                <button onClick={sendChat} disabled={!chatText.trim() || sendingChat} style={{ width:'42px', height:'42px', borderRadius:'50%', background:chatText.trim()?'var(--accent)':'var(--surface2)', border:'none', display:'flex', alignItems:'center', justifyContent:'center', cursor:chatText.trim()?'pointer':'default', transition:'background 0.15s', flexShrink:0 }}>
                  <I n="Send" s={16} c={chatText.trim()?'#050a14':'var(--text3)'} />
                </button>
              </div>
            </div>
          )}

          {/* ---- WAITLIST TAB (host only) ---- */}
          {tab === 'waitlist' && isHost && (
            <div style={{ maxWidth:'500px', margin:'0 auto', width:'100%', padding:'0 20px 80px', flex:1 }}>
              {waitlist.length === 0 ? (
                <Empty icon="Bell" title="No one waiting" sub="Players who request to join when full will appear here" />
              ) : (
                <Card>
                  <div style={{ fontWeight:'700', fontSize:'15px', marginBottom:'16px' }}>
                    {waitlist.length} {waitlist.length === 1 ? 'person' : 'people'} waiting for approval
                  </div>
                  {waitlist.map((p, i) => (
                    <div key={p.oderId} style={{ display:'flex', alignItems:'center', gap:'12px', padding:'12px 0', borderBottom: i < waitlist.length-1 ? '1px solid var(--border)' : 'none' }}>
                      <Avatar src={p.photoURL} name={p.firstName||p.userName} size={46} />
                      <div style={{ flex:1 }}>
                        <div style={{ fontWeight:'600', fontSize:'14px' }}>{p.firstName||p.userName}</div>
                        {p.requestedAt && <div style={{ fontSize:'11px', color:'var(--text3)', marginTop:'2px' }}>
                          Requested {new Date(p.requestedAt).toLocaleDateString('en-US',{month:'short',day:'numeric'})}
                        </div>}
                      </div>
                      <div style={{ display:'flex', gap:'6px', flexShrink:0 }}>
                        <button onClick={() => approveWaitlist(p.oderId)} style={{ padding:'8px 14px', borderRadius:'var(--radius3)', background:'var(--accent3)', border:'1px solid var(--accent)', color:'var(--accent)', fontSize:'13px', fontWeight:'700', cursor:'pointer' }}>
                          ✓ Approve
                        </button>
                        <button onClick={() => denyWaitlist(p.oderId)} style={{ padding:'8px 12px', borderRadius:'var(--radius3)', background:'rgba(248,113,113,0.08)', border:'1px solid rgba(248,113,113,0.3)', color:'var(--red)', fontSize:'13px', cursor:'pointer' }}>
                          ✕
                        </button>
                      </div>
                    </div>
                  ))}
                </Card>
              )}
            </div>
          )}
        </div>
      );
    }

    // ==================== COURTS SCREEN ====================
    function CourtsScreen({ setScreen }) {
      const { currentUser, userProfile } = useAuth();
      const [courts, setCourts] = useState([]);
      const [loading, setLoading] = useState(true);
      const [search, setSearch] = useState('');
      const [filter, setFilter] = useState('all');
      const [showAdd, setShowAdd] = useState(false);
      const [showMap, setShowMap] = useState(false);
      const [selectedCourt, setSelectedCourt] = useState(null);
      const [showReview, setShowReview] = useState(null);

      useEffect(() => {
        return db.collection('courts').orderBy('createdAt','desc').onSnapshot(s => { setCourts(s.docs.map(d=>({id:d.id,...d.data()}))); setLoading(false); }, () => setLoading(false));
      }, []);

      const filtered = courts.filter(c => {
        const matchSearch = !search || `${c.name} ${c.location}`.toLowerCase().includes(search.toLowerCase());
        const matchFilter = filter === 'all' || (filter === 'mine' && c.ownerId === currentUser?.uid) || (filter === 'available' && c.isAvailable);
        return matchSearch && matchFilter;
      });

      const isOwner = userProfile?.roles?.includes('courtOwner');

      return (
        <div style={{ minHeight:'100vh', background:'var(--bg)', paddingBottom:'100px' }}>
          <div style={{ maxWidth:'500px', margin:'0 auto', padding:'24px 20px' }}>
            <PageHeader title="Courts" right={
              <div style={{ display:'flex', gap:'8px' }}>
                <Btn onClick={() => setShowMap(true)} variant="secondary" size="sm"><I n="Map" s={14} c="currentColor" /></Btn>
                {isOwner && <Btn onClick={() => setShowAdd(true)} size="sm" icon="Plus">List Court</Btn>}
              </div>
            } />

            <div style={{ position:'relative', marginBottom:'16px' }}>
              <I n="Search" s={16} c="var(--text3)" style={{ position:'absolute', left:'14px', top:'50%', transform:'translateY(-50%)', pointerEvents:'none' }} />
              <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search courts or location..." style={{ width:'100%', padding:'12px 14px 12px 40px', background:'var(--surface)', border:'1px solid var(--border2)', borderRadius:'var(--radius2)', color:'var(--text)', fontSize:'14px', outline:'none' }} />
            </div>

            <Tabs tabs={[{key:'all',label:'All Courts'},{key:'available',label:'Available'},{key:'mine',label:'My Courts'}]} active={filter} onChange={setFilter} />

            {!isOwner && <div style={{ display:'flex', alignItems:'center', gap:'12px', padding:'14px 16px', background:'var(--accent3)', border:'1px solid rgba(74,222,128,0.2)', borderRadius:'var(--radius2)', marginBottom:'16px' }}>
              <I n="Info" s={18} c="var(--accent)" />
              <div style={{ flex:1, fontSize:'13px', color:'var(--text2)' }}>Own a court? Enable the Court Owner role in your profile to list it.</div>
              <Btn onClick={() => setScreen('profile')} variant="ghost" size="sm">Profile</Btn>
            </div>}

            {loading ? <div style={{ textAlign:'center', padding:'40px', color:'var(--text3)' }}>Loading courts...</div> :
              filtered.length === 0 ? <Empty icon="Court" title="No courts found" sub={isOwner ? "List your first court" : "No courts available yet"} action={isOwner && <Btn onClick={() => setShowAdd(true)} size="sm" icon="Plus">List Court</Btn>} /> :
              filtered.map(c => <CourtCard key={c.id} court={c} onSelect={setSelectedCourt} onReview={() => setShowReview(c)} />)
            }
          </div>

          {showAdd && <AddCourtModal onClose={() => setShowAdd(false)} />}
          {showMap && <MapModal items={filtered.filter(c=>c.locationCoords).map(c=>({name:c.name,sub:c.location,coords:c.locationCoords}))} onClose={() => setShowMap(false)} title="Courts Near You" />}
          {selectedCourt && <CourtDetailModal court={selectedCourt} onClose={() => setSelectedCourt(null)} onReview={() => { setShowReview(selectedCourt); setSelectedCourt(null); }} />}
          {showReview && <ReviewModal targetId={showReview.id} targetType="court" targetName={showReview.name} onClose={() => setShowReview(null)} />}
        </div>
      );
    }

    function CourtCard({ court, onSelect, onReview }) {
      return (
        <Card onClick={() => onSelect(court)} style={{ cursor:'pointer' }}>
          {court.photos?.[0] && <img src={court.photos[0]} alt={court.name} style={{ width:'100%', height:'160px', objectFit:'cover', borderRadius:'var(--radius2)', marginBottom:'14px' }} onError={e => e.target.style.display='none'} />}
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:'8px' }}>
            <div style={{ fontWeight:'700', fontSize:'16px', flex:1, marginRight:'8px' }}>{court.name}</div>
            <div style={{ display:'flex', gap:'6px', flexShrink:0 }}>
              {court.isAvailable && <Badge color="green">Available</Badge>}
              {court.isPaid && <Badge color="amber">Paid</Badge>}
            </div>
          </div>
          {court.location && <div style={{ display:'flex', alignItems:'center', gap:'5px', fontSize:'13px', color:'var(--text2)', marginBottom:'8px' }}><I n="MapPin" s={13} c="var(--text3)" />{court.location.split(',')[0]}</div>}
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
            <div style={{ display:'flex', alignItems:'center', gap:'12px', fontSize:'13px', color:'var(--text2)' }}>
              {court.surfaces && <span>{court.surfaces}</span>}
              {court.avgRating && <span style={{ display:'flex', alignItems:'center', gap:'3px', color:'#fbbf24' }}><I n="Star" s={12} c="#fbbf24" />{court.avgRating.toFixed(1)}{court.reviewCount && ` (${court.reviewCount})`}</span>}
            </div>
            <button onClick={e => { e.stopPropagation(); onReview(); }} style={{ background:'var(--accent3)', border:'1px solid rgba(74,222,128,0.2)', borderRadius:'var(--radius3)', padding:'5px 10px', cursor:'pointer', fontSize:'12px', fontWeight:'600', color:'var(--accent)' }}>Rate</button>
          </div>
        </Card>
      );
    }

    function CourtDetailModal({ court, onClose, onReview }) {
      const { currentUser, userProfile } = useAuth();
      const [tab, setTab] = useState('info');
      const isOwner = court.ownerId === currentUser?.uid;

      return (
        <Modal onClose={onClose} title={court.name}>
          {court.photos?.[0] && <img src={court.photos[0]} alt={court.name} style={{ width:'100%', height:'200px', objectFit:'cover', borderRadius:'var(--radius2)', marginBottom:'16px' }} />}
          <Tabs tabs={[{key:'info',label:'Info'},{key:'availability',label:'Availability'}]} active={tab} onChange={setTab} />
          {tab === 'info' && <div>
            {court.location && <div style={{ display:'flex', alignItems:'center', gap:'8px', marginBottom:'12px', color:'var(--text2)', fontSize:'14px' }}><I n="MapPin" s={14} c="var(--text3)" />{court.location}</div>}
            {court.description && <p style={{ fontSize:'14px', lineHeight:'1.6', color:'var(--text2)', marginBottom:'16px' }}>{court.description}</p>}
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'10px', marginBottom:'20px' }}>
              {court.surfaces && <div style={{ padding:'12px', background:'var(--surface)', borderRadius:'var(--radius2)', fontSize:'13px' }}><div style={{ color:'var(--text3)', marginBottom:'4px' }}>Surface</div><div style={{ fontWeight:'600' }}>{court.surfaces}</div></div>}
              {court.numCourts && <div style={{ padding:'12px', background:'var(--surface)', borderRadius:'var(--radius2)', fontSize:'13px' }}><div style={{ color:'var(--text3)', marginBottom:'4px' }}>Courts</div><div style={{ fontWeight:'600' }}>{court.numCourts}</div></div>}
              {court.pricePerHour && <div style={{ padding:'12px', background:'var(--surface)', borderRadius:'var(--radius2)', fontSize:'13px' }}><div style={{ color:'var(--text3)', marginBottom:'4px' }}>Rate</div><div style={{ fontWeight:'600' }}>${court.pricePerHour}/hr</div></div>}
              {court.avgRating && <div style={{ padding:'12px', background:'var(--surface)', borderRadius:'var(--radius2)', fontSize:'13px' }}><div style={{ color:'var(--text3)', marginBottom:'4px' }}>Rating</div><div style={{ fontWeight:'600', display:'flex', alignItems:'center', gap:'4px' }}><I n="Star" s={12} c="#fbbf24" />{court.avgRating.toFixed(1)}</div></div>}
            </div>
            {court.amenities?.length > 0 && <div style={{ marginBottom:'20px' }}><div style={{ fontSize:'13px', color:'var(--text2)', marginBottom:'8px' }}>Amenities</div><div style={{ display:'flex', flexWrap:'wrap', gap:'6px' }}>{court.amenities.map((a,i) => <span key={i} style={{ background:'var(--surface)', border:'1px solid var(--border)', borderRadius:'20px', padding:'4px 12px', fontSize:'12px', color:'var(--text2)' }}>{a}</span>)}</div></div>}
            <Btn onClick={onReview} variant="outline" size="md" style={{ width:'100%' }} icon="Star">Write a Review</Btn>
          </div>}
          {tab === 'availability' && <div>
            {court.availabilitySlots?.length > 0 ? court.availabilitySlots.map((slot, i) => (
              <div key={i} style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'12px', background:'var(--surface)', borderRadius:'var(--radius2)', marginBottom:'8px' }}>
                <div style={{ fontWeight:'600', fontSize:'14px' }}>{slot.day}</div>
                <div style={{ color:'var(--text2)', fontSize:'13px' }}>{slot.from} – {slot.to}</div>
                <Badge color={slot.booked ? 'red' : 'green'}>{slot.booked ? 'Booked' : 'Open'}</Badge>
              </div>
            )) : <Empty icon="Calendar" title="No availability set" sub="Contact court owner to book" />}
          </div>}
        </Modal>
      );
    }

    function AddCourtModal({ onClose }) {
      const { currentUser, userProfile } = useAuth();
      const [form, setForm] = useState({ name:'', location:'', locationCoords:null, surfaces:'Hard', numCourts:1, description:'', pricePerHour:'', isAvailable:true, isPaid:false, amenities:[], photos:[] });
      const [saving, setSaving] = useState(false);
      const [photoURL, setPhotoURL] = useState('');

      const amenityOptions = ['Lights','Parking','Restrooms','Water','Pro Shop','Seating','Wifi'];

      const save = async () => {
        if (!form.name.trim() || !form.location.trim()) return;
        setSaving(true);
        try {
          await db.collection('courts').add({
            ...form, ownerId: currentUser.uid, ownerName: `${userProfile?.firstName} ${userProfile?.lastName}`.trim(),
            photos: form.photos.filter(p => p.trim()),
            avgRating: null, reviewCount: 0,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
          });
          onClose();
        } catch(e) {} finally { setSaving(false); }
      };

      return (
        <Modal onClose={onClose} title="List Your Court">
          <Input label="Court Name" value={form.name} onChange={e => setForm({...form, name:e.target.value})} placeholder="e.g. Canyon Park Tennis Courts" />
          <LocationInput label="Location" value={form.location} onChange={(loc,coords) => setForm({...form, location:loc, locationCoords:coords})} />
          <div style={{ marginBottom:'16px' }}>
            <div style={{ fontSize:'13px', color:'var(--text2)', marginBottom:'8px', fontWeight:'500' }}>Surface</div>
            <div style={{ display:'flex', gap:'6px', flexWrap:'wrap' }}>
              {['Hard','Clay','Grass','Carpet','Indoor'].map(s => <button key={s} onClick={() => setForm({...form, surfaces:s})} style={{ padding:'8px 14px', borderRadius:'var(--radius3)', border:`1px solid ${form.surfaces===s?'var(--accent)':'var(--border)'}`, background: form.surfaces===s?'var(--accent3)':'var(--surface)', color: form.surfaces===s?'var(--accent)':'var(--text2)', fontSize:'13px', fontWeight:'600', cursor:'pointer' }}>{s}</button>)}
            </div>
          </div>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'10px', marginBottom:'16px' }}>
            <Input label="Number of Courts" type="number" value={form.numCourts} onChange={e => setForm({...form, numCourts:parseInt(e.target.value)||1})} style={{ marginBottom:0 }} />
            <Input label="Price/hr ($, optional)" type="number" value={form.pricePerHour} onChange={e => setForm({...form, pricePerHour:e.target.value, isPaid:!!e.target.value})} style={{ marginBottom:0 }} />
          </div>
          <Textarea label="Description (optional)" value={form.description} onChange={e => setForm({...form, description:e.target.value})} placeholder="Describe the courts, rules, contact info..." style={{ minHeight:'80px' }} />

          <div style={{ marginBottom:'16px' }}>
            <div style={{ fontSize:'13px', color:'var(--text2)', marginBottom:'8px', fontWeight:'500' }}>Amenities</div>
            <div style={{ display:'flex', flexWrap:'wrap', gap:'6px' }}>
              {amenityOptions.map(a => {
                const on = form.amenities.includes(a);
                return <button key={a} onClick={() => setForm({...form, amenities: on ? form.amenities.filter(x=>x!==a) : [...form.amenities, a]})} style={{ padding:'6px 12px', borderRadius:'20px', border:`1px solid ${on?'var(--accent)':'var(--border)'}`, background: on?'var(--accent3)':'var(--surface)', color: on?'var(--accent)':'var(--text2)', fontSize:'12px', fontWeight:'600', cursor:'pointer' }}>{a}</button>;
              })}
            </div>
          </div>

          <div style={{ marginBottom:'16px' }}>
            <div style={{ fontSize:'13px', color:'var(--text2)', marginBottom:'8px', fontWeight:'500' }}>Photo URLs (one per line)</div>
            <textarea value={form.photos.join('\n')} onChange={e => setForm({...form, photos:e.target.value.split('\n')})} placeholder="https://..." style={{ width:'100%', padding:'12px', background:'var(--surface)', border:'1px solid var(--border2)', borderRadius:'var(--radius2)', color:'var(--text)', fontSize:'13px', outline:'none', resize:'vertical', minHeight:'70px' }} />
          </div>

          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:'20px' }}>
            <span style={{ fontWeight:'500', fontSize:'14px' }}>Currently available</span>
            <Toggle on={form.isAvailable} onChange={v => setForm({...form, isAvailable:v})} />
          </div>
          <Btn onClick={save} disabled={saving} size="lg">{saving ? 'Listing...' : 'List Court'}</Btn>
        </Modal>
      );
    }

    // ==================== COACHES SCREEN ====================

      useEffect(() => {

          .onSnapshot(s => { setCoaches(s.docs.map(d=>({id:d.id,...d.data()}))); setLoading(false); }, () => setLoading(false));

      const filtered = coaches.filter(c => {
        if (!search) return true;
        return `${c.firstName} ${c.lastName} ${c.coachProfile?.specialties?.join(' ')||''}`.toLowerCase().includes(search.toLowerCase());
      });

      return (
        <div style={{ minHeight:'100vh', background:'var(--bg)', paddingBottom:'100px' }}>
          <div style={{ maxWidth:'500px', margin:'0 auto', padding:'24px 20px' }}>
            <PageHeader title="Coaches" right={<Btn onClick={() => setShowMap(true)} variant="secondary" size="sm"><I n="Map" s={14} c="currentColor" /></Btn>} />

            <div style={{ position:'relative', marginBottom:'16px' }}>
              <I n="Search" s={16} c="var(--text3)" style={{ position:'absolute', left:'14px', top:'50%', transform:'translateY(-50%)', pointerEvents:'none' }} />
              <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search coaches, specialties..." style={{ width:'100%', padding:'12px 14px 12px 40px', background:'var(--surface)', border:'1px solid var(--border2)', borderRadius:'var(--radius2)', color:'var(--text)', fontSize:'14px', outline:'none' }} />
            </div>

            <LocationInput value={userLocation} onChange={(loc) => setUserLocation(loc)} placeholder="Your location for nearby coaches..." style={{ marginBottom:'16px' }} />

            <Tabs tabs={[{key:'all',label:'All'},{key:'available',label:'Available Today'}]} active={filter} onChange={setFilter} />

            {loading ? <div style={{ textAlign:'center', padding:'40px', color:'var(--text3)' }}>Loading coaches...</div> :
              filtered.length === 0 ? <Empty icon="Award" title="No coaches found" sub="Coaches will appear here once they register" /> :
              filtered.map(c => <CoachCard key={c.id} coach={c} onSelect={setSelectedCoach} onReview={() => setShowReview(c)} />)

          {showMap && <MapModal items={filtered.filter(c=>c.locationCoords).map(c=>({name:`${c.firstName} ${c.lastName}`,sub:c.location||c.coachProfile?.area,coords:c.locationCoords}))} onClose={() => setShowMap(false)} title="Coaches Near You" />}
          {selectedCoach && <CoachDetailModal coach={selectedCoach} onClose={() => setSelectedCoach(null)} onReview={() => { setShowReview(selectedCoach); setSelectedCoach(null); }} />}
          {showReview && <ReviewModal targetId={showReview.id} targetType="coach" targetName={`${showReview.firstName} ${showReview.lastName}`} onClose={() => setShowReview(null)} />}
        </div>
      );
    }

    // ==================== PLAYERS SCREEN ====================
    function PlayersScreen() {
      const { currentUser, userProfile, refreshProfile } = useAuth();
      const [allPlayers, setAllPlayers] = useState([]);
      const [loading, setLoading] = useState(true);
      const [search, setSearch] = useState('');
      const [tab, setTab] = useState('all');

      useEffect(() => {
        db.collection('users').limit(100).get().then(s => {
          setAllPlayers(s.docs.map(d=>({oderId:d.id,...d.data()})).filter(p => p.oderId !== currentUser?.uid));
          setLoading(false);
        }).catch(() => setLoading(false));
      }, []);

      const friends = allPlayers.filter(p => userProfile?.friends?.includes(p.oderId));
      const requests = allPlayers.filter(p => userProfile?.friendRequests?.includes(p.oderId));
      const filtered = (tab === 'friends' ? friends : tab === 'requests' ? requests : allPlayers).filter(p => !search || `${p.firstName} ${p.lastName}`.toLowerCase().includes(search.toLowerCase()));

      const sendRequest = async (p) => {
        if (userProfile?.sentRequests?.includes(p.oderId)) return;
        await db.collection('users').doc(currentUser.uid).update({ sentRequests: firebase.firestore.FieldValue.arrayUnion(p.oderId) });
        await db.collection('users').doc(p.oderId).update({ friendRequests: firebase.firestore.FieldValue.arrayUnion(currentUser.uid) });
        refreshProfile();
      };
      const acceptRequest = async (p) => {
        await db.collection('users').doc(currentUser.uid).update({ friends: firebase.firestore.FieldValue.arrayUnion(p.oderId), friendRequests: firebase.firestore.FieldValue.arrayRemove(p.oderId) });
        await db.collection('users').doc(p.oderId).update({ friends: firebase.firestore.FieldValue.arrayUnion(currentUser.uid), sentRequests: firebase.firestore.FieldValue.arrayRemove(currentUser.uid) });
        refreshProfile();
      };
      const declineRequest = async (p) => {
        await db.collection('users').doc(currentUser.uid).update({ friendRequests: firebase.firestore.FieldValue.arrayRemove(p.oderId) });
        await db.collection('users').doc(p.oderId).update({ sentRequests: firebase.firestore.FieldValue.arrayRemove(currentUser.uid) });
        refreshProfile();
      };

      const getStatus = (p) => {
        if (userProfile?.friends?.includes(p.oderId)) return 'friend';
        if (userProfile?.sentRequests?.includes(p.oderId)) return 'pending';
        if (userProfile?.friendRequests?.includes(p.oderId)) return 'request';
        return 'none';
      };

      return (
        <div style={{ minHeight:'100vh', background:'var(--bg)', paddingBottom:'100px' }}>
          <div style={{ maxWidth:'500px', margin:'0 auto', padding:'24px 20px' }}>
            <PageHeader title="Players" />
            <div style={{ position:'relative', marginBottom:'16px' }}>
              <I n="Search" s={16} c="var(--text3)" style={{ position:'absolute', left:'14px', top:'50%', transform:'translateY(-50%)', pointerEvents:'none' }} />
              <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search players..." style={{ width:'100%', padding:'12px 14px 12px 40px', background:'var(--surface)', border:'1px solid var(--border2)', borderRadius:'var(--radius2)', color:'var(--text)', fontSize:'14px', outline:'none' }} />
            </div>
            <Tabs tabs={[{key:'all',label:'All Players'},{key:'friends',label:`Friends (${friends.length})`},{key:'requests',label:`Requests (${requests.length})`}]} active={tab} onChange={setTab} />

            {loading ? <div style={{ textAlign:'center', padding:'40px', color:'var(--text3)' }}>Loading...</div> :
              filtered.length === 0 ? <Empty icon="Users" title={tab==='friends'?'No friends yet':tab==='requests'?'No requests':'No players'} sub="Connect with players on Tennisverse" /> :
              filtered.map(p => {
                const status = getStatus(p);
                const isCoach = p.roles?.includes('coach');
                const stats = p.stats || {};
                return (
                  <Card key={p.oderId} style={{ display:'flex', alignItems:'center', gap:'14px' }}>
                    <Avatar src={p.photoURL} name={`${p.firstName} ${p.lastName}`} size={48} />
                    <div style={{ flex:1, minWidth:0 }}>
                      <div style={{ display:'flex', alignItems:'center', gap:'8px', marginBottom:'2px' }}>
                        <span style={{ fontWeight:'700', fontSize:'15px' }}>{p.firstName} {p.lastName}</span>
                        {isCoach && <Badge color="purple">Coach</Badge>}
                      </div>
                      <div style={{ display:'flex', gap:'12px', fontSize:'12px', color:'var(--text2)' }}>
                        {p.location && <span style={{ display:'flex', alignItems:'center', gap:'3px' }}><I n="MapPin" s={11} c="var(--text3)" />{p.location.split(',')[0]}</span>}
                        {p.skillLevel && <span style={{ textTransform:'capitalize' }}>{p.skillLevel}</span>}
                        {stats.gamesPlayed > 0 && <span>{stats.gamesPlayed} games</span>}
                      </div>
                    </div>
                    <div style={{ flexShrink:0 }}>
                      {status === 'friend' && <Badge color="green">Friends</Badge>}
                      {status === 'pending' && <Badge color="amber">Pending</Badge>}
                      {status === 'request' && <div style={{ display:'flex', gap:'6px' }}>
                        <Btn onClick={() => acceptRequest(p)} size="sm">Accept</Btn>
                        <Btn onClick={() => declineRequest(p)} variant="ghost" size="sm"><I n="X" s={14} c="currentColor" /></Btn>
                      </div>}
                      {status === 'none' && <Btn onClick={() => sendRequest(p)} variant="outline" size="sm">Add</Btn>}
                    </div>
                  </Card>
                );
              })
            }
          </div>
        </div>
      );
    }

    // ==================== PROFILE SCREEN ====================
    function ProfileScreen({ onLogout, setScreen }) {
      const { currentUser, userProfile, updateProfile, logout } = useAuth();
      const [editing, setEditing] = useState(false);
      const [form, setForm] = useState({ firstName:'', lastName:'', phone:'', location:'', skillLevel:'intermediate' });
      const [saving, setSaving] = useState(false);
      const [tab, setTab] = useState('profile');
      const [gameHistory, setGameHistory] = useState([]);
      const [showCoachEditor, setShowCoachEditor] = useState(false);

      useEffect(() => {
        if (userProfile) setForm({
          firstName: userProfile.firstName||'',
          lastName: userProfile.lastName||'',
          phone: userProfile.phone||'',
          location: userProfile.location||'',
          skillLevel: userProfile.skillLevel||'intermediate'
        });
      }, [userProfile]);

      useEffect(() => {
        if (!currentUser) return;
        db.collection('events').orderBy('dateTime','desc').limit(20).get()
          .then(s => {
            const myGames = s.docs.map(d=>({id:d.id,...d.data()}))
              .filter(g => (g.rsvps||[]).some(r => r.oderId === currentUser.uid && r.status==='going'));
            setGameHistory(myGames);
          }).catch(()=>{});
      }, [currentUser]);

      const save = async () => {
        setSaving(true);
        await updateProfile({ firstName:form.firstName, lastName:form.lastName, phone:form.phone, location:form.location, skillLevel:form.skillLevel });
        setSaving(false); setEditing(false);
      };

      const toggleCoach = async () => {
        const roles = userProfile?.roles || ['player'];
        const isCoach = roles.includes('coach');
        const newRoles = isCoach ? roles.filter(r => r !== 'coach') : [...roles.filter(r=>r!=='coach'), 'coach'];
        if (!newRoles.includes('player')) newRoles.unshift('player');
        await updateProfile({ roles: newRoles });
      };

      // Phone formatter: (555) 000-0000 or +1 (555) 000-0000
      const fmtPhone = (raw) => {
        if (!raw) return null;
        const digits = raw.replace(/\D/g,'');
        if (digits.length === 10) {
          return `(${digits.slice(0,3)}) ${digits.slice(3,6)}-${digits.slice(6)}`;
        } else if (digits.length === 11 && digits[0]==='1') {
          return `+1 (${digits.slice(1,4)}) ${digits.slice(4,7)}-${digits.slice(7)}`;
        }
        return raw; // return as-is if not standard
      };

      // Phone input formatter: auto-insert formatting as user types
      const handlePhoneChange = (e) => {
        let val = e.target.value.replace(/\D/g,'');
        if (val.length > 11) val = val.slice(0,11);
        let formatted = val;
        if (val.length > 0 && val[0] === '1' && val.length > 1) {
          // International format
          const rest = val.slice(1);
          if (rest.length <= 3) formatted = `+1 (${rest}`;
          else if (rest.length <= 6) formatted = `+1 (${rest.slice(0,3)}) ${rest.slice(3)}`;
          else formatted = `+1 (${rest.slice(0,3)}) ${rest.slice(3,6)}-${rest.slice(6)}`;
        } else {
          if (val.length <= 3) formatted = val;
          else if (val.length <= 6) formatted = `(${val.slice(0,3)}) ${val.slice(3)}`;
          else formatted = `(${val.slice(0,3)}) ${val.slice(3,6)}-${val.slice(6)}`;
        }
        setForm({...form, phone: formatted});
      };

      const stats = userProfile?.stats || {};
      const roles = userProfile?.roles || ['player'];
      const isCoach = roles.includes('coach');

      const skillColors = { beginner:'#4ade80', intermediate:'#60a5fa', advanced:'#fbbf24', pro:'#f87171' };
      const skillColor = skillColors[form.skillLevel] || '#4ade80';

      const fmtDate = (ts) => {
        if (!ts) return '';
        const d = ts.toDate ? ts.toDate() : new Date(ts);
        return d.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
      };

      const InfoRow = ({ icon, label, value, accent }) => value ? (
        <div style={{ display:'flex', alignItems:'center', gap:'14px', padding:'14px 0', borderBottom:'1px solid rgba(255,255,255,0.05)' }}>
          <div style={{ width:'38px', height:'38px', borderRadius:'10px', background: accent ? `${accent}18` : '#1a2538', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
            <I n={icon} s={17} c={accent || '#4a5878'} />
          </div>
          <div>
            <div style={{ fontSize:'11px', color:'#4a5878', fontWeight:'700', letterSpacing:'0.06em', textTransform:'uppercase', marginBottom:'2px' }}>{label}</div>
            <div style={{ fontSize:'15px', fontWeight:'600', color:'#f0f4ff' }}>{value}</div>
          </div>
        </div>
      ) : null;

      return (
        <div style={{ minHeight:'100vh', background:'var(--bg)', paddingBottom:'100px' }}>
          <div style={{ maxWidth:'500px', margin:'0 auto', padding:'24px 20px' }}>
            <PageHeader title="Profile" right={
              <button onClick={() => { logout(); onLogout(); }} style={{ display:'flex', alignItems:'center', gap:'6px', background:'rgba(248,113,113,0.08)', border:'1px solid rgba(248,113,113,0.2)', borderRadius:'10px', padding:'8px 14px', color:'#f87171', fontSize:'13px', fontWeight:'600', cursor:'pointer' }}>
                <I n="LogOut" s={14} c="#f87171" /> Sign Out
              </button>
            } />

            {/* ── AVATAR + NAME ── */}
            <div style={{ display:'flex', flexDirection:'column', alignItems:'center', marginBottom:'28px', gap:'12px' }}>
              <div style={{ position:'relative' }}>
                <Avatar src={userProfile?.photoURL} name={`${userProfile?.firstName} ${userProfile?.lastName}`} size={88} />
                {/* Coach crown badge */}
                {isCoach && (
                  <div style={{ position:'absolute', bottom:'-4px', right:'-4px', width:'28px', height:'28px', borderRadius:'50%', background:'#fbbf24', border:'3px solid var(--bg)', display:'flex', alignItems:'center', justifyContent:'center' }}>
                    <I n="Crown" s={14} c="#050a14" />
                  </div>
                )}
              </div>
              <div style={{ textAlign:'center' }}>
                <h2 style={{ margin:'0 0 4px', fontSize:'24px', fontWeight:'800', letterSpacing:'-0.03em' }}>{userProfile?.firstName} {userProfile?.lastName}</h2>
                <div style={{ fontSize:'13px', color:'var(--text2)', marginBottom:'10px' }}>{currentUser?.email}</div>
                <div style={{ display:'flex', gap:'6px', justifyContent:'center', flexWrap:'wrap' }}>
                  <span style={{ display:'inline-flex', alignItems:'center', gap:'5px', padding:'5px 12px', background:'rgba(74,222,128,0.12)', border:'1px solid rgba(74,222,128,0.25)', borderRadius:'20px', fontSize:'12px', fontWeight:'700', color:'#4ade80' }}>
                    <I n="Activity" s={11} c="#4ade80" /> Player
                  </span>
                  {isCoach && (
                    <span style={{ display:'inline-flex', alignItems:'center', gap:'5px', padding:'5px 12px', background:'rgba(251,191,36,0.12)', border:'1px solid rgba(251,191,36,0.25)', borderRadius:'20px', fontSize:'12px', fontWeight:'700', color:'#fbbf24' }}>
                      <I n="Crown" s={11} c="#fbbf24" /> Coach
                    </span>
                  )}
                  {form.skillLevel && (
                    <span style={{ display:'inline-flex', alignItems:'center', gap:'5px', padding:'5px 12px', background:`${skillColor}18`, border:`1px solid ${skillColor}33`, borderRadius:'20px', fontSize:'12px', fontWeight:'700', color:skillColor, textTransform:'capitalize' }}>
                      {form.skillLevel}
                    </span>
                  )}
                </div>
              </div>
            </div>

            {/* ── STATS ── */}
            <div style={{ display:'grid', gridTemplateColumns:'repeat(3, 1fr)', gap:'8px', marginBottom:'24px' }}>
              {[
                { label:'Games', value:stats.gamesPlayed||0, icon:'Activity', color:'#4ade80' },
                { label:'Wins', value:stats.totalWins||0, icon:'Trophy', color:'#fbbf24' },
                { label:'Friends', value:userProfile?.friends?.length||0, icon:'Users', color:'#60a5fa' },
              ].map(s => (
                <div key={s.label} style={{ background:'var(--surface)', border:'1px solid var(--border)', borderRadius:'var(--radius2)', padding:'16px 8px', textAlign:'center' }}>
                  <div style={{ fontWeight:'900', fontSize:'24px', letterSpacing:'-0.03em', color:s.color }}>{s.value}</div>
                  <div style={{ fontSize:'11px', color:'var(--text3)', fontWeight:'600', marginTop:'3px', textTransform:'uppercase', letterSpacing:'0.04em' }}>{s.label}</div>
                </div>
              ))}
            </div>

            {/* ── TABS ── */}
            <Tabs tabs={[{key:'profile',label:'Profile'},{key:'roles',label:'Role'},{key:'history',label:'History'}]} active={tab} onChange={setTab} />

            {/* ── PROFILE TAB ── */}
            {tab === 'profile' && <div className="animate-in">
              {!editing ? (
                <Card>
                  <InfoRow icon="MapPin" label="Location" value={userProfile?.location || null} accent="#4ade80" />
                  <InfoRow icon="Activity" label="Skill Level" value={form.skillLevel ? form.skillLevel.charAt(0).toUpperCase()+form.skillLevel.slice(1) : null} accent={skillColor} />
                  <InfoRow icon="Phone" label="Phone" value={fmtPhone(userProfile?.phone)} accent="#60a5fa" />
                  <InfoRow icon="Mail" label="Email" value={currentUser?.email} accent="#a78bfa" />

              <Btn onClick={addLocation} size="sm" icon="Plus">Add</Btn>

                <button onClick={() => setForm({...form, availability:form.availability.filter((_,j)=>j!==i)})} style={{ background:'none', border:'none', cursor:'pointer', color:'var(--red)', padding:'4px' }}><I n="X" s={14} c="var(--red)" /></button>

    // ==================== LIVE GAME SCREEN ====================
    const GAME_SESSION_KEY = 'tv_live_game_session';

    function LiveGameScreen({ event, onBack, players = [], format = 'kings' }) {
      const { currentUser } = useAuth();

      // ── players list ──────────────────────────────────────────
      const gamePlayers = React.useMemo(() => {
        if (event) return (event.rsvps||[]).filter(r=>r.status==='going').map(r=>({ id:r.oderId, name:r.firstName||r.userName, photoURL:r.photoURL }));
        return players.map(p => ({ id: p.oderId||p.id||p.name, name: p.firstName||p.name, photoURL: p.photoURL }));
      }, []);

      // ── restore from localStorage if session exists ────────────
      const getSavedSession = () => {
        try {
          const raw = localStorage.getItem(GAME_SESSION_KEY);
          if (!raw) return null;
          const s = JSON.parse(raw);
          // Validate it matches the current player set
          const savedIds = Object.keys(s.gameStats || {}).sort().join(',');
          const currentIds = gamePlayers.map(p => p.id).sort().join(',');
          if (savedIds !== currentIds) return null;
          return s;
        } catch(e) { return null; }
      };

      const saved = getSavedSession();

      // ── core state ────────────────────────────────────────────
      const [gameStats, setGameStats] = useState(() => {
        if (saved?.gameStats) return saved.gameStats;
        const s = {};
        gamePlayers.forEach(p => { s[p.id] = { timeMs:0, wins:0, winners:0 }; });
        return s;
      });
      const [currentKings, setCurrentKings] = useState(saved?.currentKings || []);
      const [selected, setSelected] = useState([]);           // pre-selection buffer
      const [totalMs, setTotalMs] = useState(saved?.totalMs || 0);
      const [isRunning, setIsRunning] = useState(saved?.isRunning || false);
      const [isPaused, setIsPaused] = useState(saved ? true : false); // always resume paused so timer doesn't jump
      const [phase, setPhase] = useState('game');
      const [winnerAnim, setWinnerAnim] = useState(null);
      const [showConfetti, setShowConfetti] = useState(false);
      const [savingResults, setSavingResults] = useState(false);
      const [showResumePrompt, setShowResumePrompt] = useState(!!saved);

      const intervalRef = useRef(null);
      const winnerCooldown = useRef(false);
      const wakeLockRef = useRef(null);
      const [winnersThisRound, setWinnersThisRound] = useState(saved?.winnersThisRound || {});
      const [showEditScoreboard, setShowEditScoreboard] = useState(false);
      const [editForm, setEditForm] = useState({});

      // ── wake lock ─────────────────────────────────────────────
      const requestWakeLock = async () => { try { if ('wakeLock' in navigator) wakeLockRef.current = await navigator.wakeLock.request('screen'); } catch(e){} };
      const releaseWakeLock = async () => { if (wakeLockRef.current) { try { await wakeLockRef.current.release(); } catch(e){} wakeLockRef.current = null; } };

      useEffect(() => {
        const onVisible = async () => { if (document.visibilityState==='visible' && isRunning && !isPaused) await requestWakeLock(); };
        document.addEventListener('visibilitychange', onVisible);
        return () => document.removeEventListener('visibilitychange', onVisible);
      }, [isRunning, isPaused]);

      // ── persist session to localStorage ───────────────────────
      useEffect(() => {
        if (phase === 'results') return; // game over, don't persist
        try {
          const session = {
            gameStats, currentKings, totalMs, isRunning,
            winnersThisRound,
            gamePlayers, // store player info so we can rebuild on reload
            savedAt: Date.now(),
          };
          localStorage.setItem(GAME_SESSION_KEY, JSON.stringify(session));
        } catch(e) {}
      }, [gameStats, currentKings, totalMs, isRunning, winnersThisRound, phase]);

      // ── timer tick ────────────────────────────────────────────
      useEffect(() => {
        if (isRunning && !isPaused && currentKings.length === 2) {
          intervalRef.current = setInterval(() => {
            setGameStats(prev => {
              const n = {...prev};
              currentKings.forEach(id => { if (n[id]) n[id] = {...n[id], timeMs: n[id].timeMs + 100}; });
              return n;
            });
            setTotalMs(t => t + 100);
          }, 100);
        }
        return () => clearInterval(intervalRef.current);
      }, [isRunning, isPaused, currentKings]);

      // ── helpers ───────────────────────────────────────────────
      const fmtMs = (ms) => {
        const s = Math.floor(ms/1000);
        return `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;
      };
      const fmtMsLong = (ms) => {
        const s = Math.floor(ms/1000);
        return `${Math.floor(s/60)}m ${(s%60)}s`;
      };

      const getLeaderboard = () => Object.entries(gameStats).map(([id, s]) => {
        const p = gamePlayers.find(x => x.id === id);
        return { id, name: p?.name||id, photoURL: p?.photoURL, timeMs: s.timeMs, wins: s.wins, winners: s.winners, avg: s.wins > 0 ? s.timeMs/s.wins : 0 };
      }).sort((a,b) => b.timeMs - a.timeMs);

      // ── king selection ────────────────────────────────────────
      const tapPlayer = (id) => {
        if (isPaused) return;
        // If already a king, ignore tap on card (winner btn handles it)
        if (currentKings.includes(id)) return;

        const alreadySelected = selected.includes(id);
        if (alreadySelected) {
          setSelected(prev => prev.filter(x => x !== id));
          return;
        }

        const next = [...selected, id];

        if (next.length === 2) {
          // Commit the 2 selected players as new kings
          setCurrentKings(prevKings => {
            setGameStats(s => {
              const n = {...s};
              next.forEach(kid => {
                if (!prevKings.includes(kid) && n[kid]) {
                  n[kid] = {...n[kid], wins: n[kid].wins + 1};
                }
              });
              return n;
            });
            return next;
          });
          setWinnersThisRound({});  // reset per-round winner tracking
          setIsRunning(true);
          setSelected([]);
        } else {
          setSelected(next);
        }
      };

      // ── winner button ─────────────────────────────────────────
      const recordWinner = (id) => {
        if (!currentKings.includes(id) || winnerCooldown.current || winnersThisRound[id]) return;
        winnerCooldown.current = true;
        setWinnersThisRound(prev => ({ ...prev, [id]: true }));
        setGameStats(prev => ({
          ...prev,
          [id]: { ...prev[id], winners: prev[id].winners + 1, timeMs: prev[id].timeMs + 60000 }
        }));
        setWinnerAnim(id);
        setTimeout(() => { setWinnerAnim(null); winnerCooldown.current = false; }, 1600);
      };

      // ── edit scoreboard ──────────────────────────────────────
      const openEditScoreboard = () => {
        // Pre-fill form with current stats, time in readable m:ss format
        const form = {};
        gamePlayers.forEach(p => {
          const s = gameStats[p.id] || { timeMs:0, wins:0, winners:0 };
          const totalSecs = Math.floor(s.timeMs / 1000);
          form[p.id] = {
            mins: String(Math.floor(totalSecs / 60)),
            secs: String(totalSecs % 60),
            wins: String(s.wins),
            winners: String(s.winners),
          };
        });
        setEditForm(form);
        setShowEditScoreboard(true);
      };

      const saveEditScoreboard = () => {
        setGameStats(prev => {
          const n = {...prev};
          gamePlayers.forEach(p => {
            const f = editForm[p.id];
            if (!f) return;
            const mins = parseInt(f.mins) || 0;
            const secs = parseInt(f.secs) || 0;
            n[p.id] = {
              timeMs: (mins * 60 + secs) * 1000,
              wins: parseInt(f.wins) || 0,
              winners: parseInt(f.winners) || 0,
            };
          });
          return n;
        });
        setShowEditScoreboard(false);
      };

      // ── pause / resume ────────────────────────────────────────
      const pauseGame = async () => { setIsPaused(true); clearInterval(intervalRef.current); await releaseWakeLock(); };
      const resumeGame = async () => { setIsPaused(false); await requestWakeLock(); };

      // ── end game ──────────────────────────────────────────────
      const endGame = async () => {
        clearInterval(intervalRef.current);
        setIsRunning(false); setIsPaused(false);
        try { localStorage.removeItem(GAME_SESSION_KEY); } catch(e) {}
        setShowConfetti(true);
        setTimeout(() => setShowConfetti(false), 5000);
        await releaseWakeLock();

        // save stats to Firestore
        setSavingResults(true);
        const lb = getLeaderboard();
        const topId = lb[0]?.id;
        for (const p of gamePlayers) {
          const s = gameStats[p.id] || {};
          try {
            await db.collection('users').doc(p.id).update({
              'stats.gamesPlayed': firebase.firestore.FieldValue.increment(1),
              'stats.totalWins': firebase.firestore.FieldValue.increment(s.wins||0),
              'stats.totalWinners': firebase.firestore.FieldValue.increment(s.winners||0),
              'stats.totalPlayTime': firebase.firestore.FieldValue.increment(Math.floor((s.timeMs||0)/1000)),
            });
          } catch(e) {}
        }
        if (event?.id) {
          await db.collection('events').doc(event.id).update({ isCompleted:true, completedAt: firebase.firestore.FieldValue.serverTimestamp() }).catch(()=>{});
        }
        setSavingResults(false);
        setPhase('results');
      };

      // ── confetti pieces ───────────────────────────────────────
      const confettiPieces = React.useMemo(() => Array.from({length:50}, (_,i) => ({
        id:i, left:Math.random()*100, delay:Math.random()*2.5, dur:2+Math.random()*2,
        color:['#4ade80','#22c55e','#fbbf24','#f87171','#60a5fa','#a78bfa','#fff'][i%7],
        size: 7+Math.random()*7
      })), []);

      const lb = getLeaderboard();
      const p1 = gamePlayers.find(p => p.id === currentKings[0]);
      const p2 = gamePlayers.find(p => p.id === currentKings[1]);
      const instrText = selected.length===0 ? (currentKings.length===0 ? 'Tap 2 players to start' : 'Tap the 2 players who won') : selected.length===1 ? 'Tap 1 more' : 'Recording…';

      // ──────────────────────────────────────────────────────────
      // RESULTS SCREEN
      // ──────────────────────────────────────────────────────────
      if (phase === 'results') {
        const champion = lb[0];
        const rankEmoji = ['🥇','🥈','🥉'];
        return (
          <div style={{ minHeight:'100vh', background:'var(--bg)', paddingBottom:'80px', animation:'fadeIn 0.3s ease-out' }}>
            {showConfetti && (

          {winnerAnim && (() => { const wp = gamePlayers.find(p=>p.id===winnerAnim); return (
            <div style={{ position:'fixed', inset:0, background:'rgba(5,10,20,0.92)', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', zIndex:200, animation:'fadeIn 0.15s ease-out' }}>

            {/* Pause + End game buttons */}
            <button onClick={pauseGame} disabled={!isRunning} style={{ width:'100%', padding:'14px', borderRadius:'var(--radius2)', background:'rgba(251,191,36,0.12)', border:'1px solid rgba(251,191,36,0.35)', color:'var(--amber)', fontSize:'14px', fontWeight:'700', cursor: isRunning?'pointer':'default', letterSpacing:'0.04em', marginBottom:'10px', opacity: isRunning?1:0.4 }}>

            <button onClick={endGame} disabled={savingResults} style={{ width:'100%', padding:'14px', borderRadius:'var(--radius2)', background:'transparent', border:'1px solid rgba(248,113,113,0.3)', color:'var(--red)', fontSize:'14px', fontWeight:'700', cursor:'pointer', letterSpacing:'0.04em' }}>
              {savingResults ? 'Saving…' : 'End Game'}

          </div>
        </div>

        {/* ── Edit Scoreboard Modal ── */}
        {showEditScoreboard && (
          <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.75)', display:'flex', alignItems:'flex-end', justifyContent:'center', zIndex:300, backdropFilter:'blur(6px)' }} onClick={() => setShowEditScoreboard(false)}>

                </button>
              </div>
              <div style={{ fontSize:'12px', color:'var(--text3)', marginBottom:'20px' }}>Adjust any player's stats directly. Changes apply immediately.</div>

              {/* Per-player edit rows */}
              {gamePlayers.map(p => {
                const f = editForm[p.id] || { mins:'0', secs:'0', wins:'0', winners:'0' };
                const updateField = (field, val) => setEditForm(prev => ({ ...prev, [p.id]: { ...prev[p.id], [field]: val } }));
                return (
                  <div key={p.id} style={{ marginBottom:'16px', padding:'16px', background:'var(--surface)', borderRadius:'var(--radius2)', border:'1px solid var(--border)' }}>
                    {/* Player name */}
                    <div style={{ display:'flex', alignItems:'center', gap:'10px', marginBottom:'14px' }}>
                      <Avatar src={p.photoURL} name={p.name} size={32} />
                      <span style={{ fontWeight:'700', fontSize:'15px' }}>{p.name}</span>
                    </div>

                    {/* Time row */}
                    <div style={{ marginBottom:'12px' }}>
                      <div style={{ fontSize:'11px', fontWeight:'700', color:'var(--text3)', letterSpacing:'0.06em', textTransform:'uppercase', marginBottom:'6px' }}>Court Time</div>
                      <div style={{ display:'flex', alignItems:'center', gap:'8px' }}>
                        <div style={{ display:'flex', alignItems:'center', gap:'4px', flex:1 }}>
                          <input
                            type="number" min="0" value={f.mins}
                            onChange={e => updateField('mins', e.target.value)}
                            style={{ width:'60px', padding:'10px 8px', background:'var(--bg)', border:'1px solid var(--border2)', borderRadius:'var(--radius3)', color:'var(--text)', fontSize:'16px', fontWeight:'700', fontFamily:"'DM Mono',monospace", textAlign:'center', outline:'none' }}
                          />
                          <span style={{ color:'var(--text3)', fontWeight:'700' }}>m</span>
                        </div>
                        <div style={{ display:'flex', alignItems:'center', gap:'4px', flex:1 }}>
                          <input
                            type="number" min="0" max="59" value={f.secs}
                            onChange={e => updateField('secs', e.target.value)}
                            style={{ width:'60px', padding:'10px 8px', background:'var(--bg)', border:'1px solid var(--border2)', borderRadius:'var(--radius3)', color:'var(--text)', fontSize:'16px', fontWeight:'700', fontFamily:"'DM Mono',monospace", textAlign:'center', outline:'none' }}
                          />
                          <span style={{ color:'var(--text3)', fontWeight:'700' }}>s</span>
                        </div>
                      </div>
                    </div>

                    {/* Wins + Winners row */}
                    <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'10px' }}>
                      <div>
                        <div style={{ fontSize:'11px', fontWeight:'700', color:'var(--text3)', letterSpacing:'0.06em', textTransform:'uppercase', marginBottom:'6px' }}>Wins</div>
                        <div style={{ display:'flex', alignItems:'center', gap:'0' }}>

                            onChange={e => updateField('wins', e.target.value)}

                          <button onClick={() => updateField('wins', String(parseInt(f.wins||0)+1))} style={{ width:'34px', height:'38px', borderRadius:'0 var(--radius3) var(--radius3) 0', background:'var(--surface2)', border:'1px solid var(--border2)', color:'var(--text)', fontSize:'18px', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}>+</button>

                      </div>
                      <div>
                        <div style={{ fontSize:'11px', fontWeight:'700', color:'var(--amber)', letterSpacing:'0.06em', textTransform:'uppercase', marginBottom:'6px' }}>🔥 Winners</div>
                        <div style={{ display:'flex', alignItems:'center', gap:'0' }}>
                          <button onClick={() => updateField('winners', String(Math.max(0, parseInt(f.winners||0)-1)))} style={{ width:'34px', height:'38px', borderRadius:'var(--radius3) 0 0 var(--radius3)', background:'var(--surface2)', border:'1px solid var(--border2)', color:'var(--text)', fontSize:'18px', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}>−</button>
                          <input
                            type="number" min="0" value={f.winners}
                            onChange={e => updateField('winners', e.target.value)}
                            style={{ width:'52px', height:'38px', background:'var(--bg)', border:'1px solid var(--border2)', borderLeft:'none', borderRight:'none', color:'var(--amber)', fontSize:'16px', fontWeight:'800', fontFamily:"'DM Mono',monospace", textAlign:'center', outline:'none' }}

                        </div>
                      </div>
                    </div>
                  </div>

              {/* Save button */}
              <button onClick={saveEditScoreboard} style={{ width:'100%', padding:'15px', borderRadius:'var(--radius2)', background:'var(--accent)', border:'none', color:'#050a14', fontSize:'15px', fontWeight:'800', cursor:'pointer', marginTop:'4px' }}>
                Save Changes
              </button>
            </div>
          </div>
        )}
        </>
      );
    }

    // ==================== MAIN APP ====================
    function App() {
      const { currentUser, loading } = useAuth();
      const [screen, setScreen] = useState('home');
      const [eventId, setEventId] = useState(null);
      const [liveGame, setLiveGame] = useState(null);
      const [instantPlayers, setInstantPlayers] = useState(null);
      const [instantFormat, setInstantFormat] = useState('kings');

      // ── on login, check for a saved game session and route back in ──
      const [recoveredPlayers, setRecoveredPlayers] = useState(null);

      React.useEffect(() => {
        if (!currentUser) return;
        try {
          const raw = localStorage.getItem(GAME_SESSION_KEY);
          if (!raw) return;
          const s = JSON.parse(raw);
          // Only auto-recover sessions saved within the last 24h
          if (!s.gamePlayers || Date.now() - s.savedAt > 86400000) {
            localStorage.removeItem(GAME_SESSION_KEY);
            return;
          }
          setRecoveredPlayers(s.gamePlayers);
        } catch(e) {}
      }, [currentUser]);

      if (loading) return (
        <div style={{ minHeight:'100vh', background:'var(--bg)', display:'flex', alignItems:'center', justifyContent:'center' }}>
          <div style={{ textAlign:'center' }}>
            <div style={{ margin:'0 auto 16px', display:'inline-block' }}><TennisverseLogo size={72} /></div>
            <div style={{ fontSize:'20px', fontWeight:'700', marginBottom:'8px' }}>Tennisverse</div>
            <div style={{ color:'var(--text3)', fontSize:'14px' }}>Loading...</div>
          </div>
        </div>
      );

      if (!currentUser) return <LoginScreen onLogin={() => setScreen('home')} />;

      // Auto-recover saved session — route straight into LiveGameScreen
      if (recoveredPlayers) return <LiveGameScreen players={recoveredPlayers} format="kings" onBack={() => { try { localStorage.removeItem(GAME_SESSION_KEY); } catch(e){} setRecoveredPlayers(null); }} />;

      if (liveGame) return <LiveGameScreen event={liveGame} onBack={() => { try { localStorage.removeItem(GAME_SESSION_KEY); } catch(e){} setLiveGame(null); }} />;
      if (instantPlayers) return <LiveGameScreen players={instantPlayers} format={instantFormat} onBack={() => { try { localStorage.removeItem(GAME_SESSION_KEY); } catch(e){} setInstantPlayers(null); }} />;

      const handleInstantGame = (players, format) => {
        if (players) { setInstantPlayers(players); setInstantFormat(format); }
      };

      const navItems = [
        { key:'home', label:'Home', icon:'Home' },
        { key:'events', label:'Games', icon:'Calendar' },
        { key:'players', label:'Players', icon:'Users' },
        { key:'profile', label:'Profile', icon:'User' },
      ];

      const showNav = !['create'].includes(screen) && !eventId;

      return (
        <>
          {screen === 'home' && !eventId && <HomeScreen onCreateEvent={() => setScreen('create')} onViewEvent={id => { setEventId(id); setScreen('events'); }} onInstantGame={handleInstantGame} setScreen={setScreen} />}
          {screen === 'events' && !eventId && <EventsScreen onViewEvent={id => setEventId(id)} onCreateEvent={() => setScreen('create')} />}
          {screen === 'events' && eventId && <EventDetailScreen eventId={eventId} onBack={() => setEventId(null)} onStartGame={e => setLiveGame(e)} />}
          {screen === 'create' && <CreateEventScreen onBack={() => setScreen('home')} onCreated={id => { setEventId(id); setScreen('events'); }} />}
          {screen === 'courts' && <CourtsScreen setScreen={setScreen} />}
          {screen === 'coaches' && <CoachesScreen />}
          {screen === 'players' && <PlayersScreen />}
          {screen === 'profile' && <ProfileScreen onLogout={() => setScreen('home')} setScreen={setScreen} />}

          {showNav && (
            <nav style={{ position:'fixed', bottom:0, left:0, right:0, background:'var(--bg2)', borderTop:'1px solid var(--border)', display:'flex', justifyContent:'space-around', zIndex:1000, paddingBottom:'max(8px, env(safe-area-inset-bottom))', paddingTop:'8px' }}>
              {navItems.map(item => {
                const active = screen === item.key;
                return (
                  <button key={item.key} onClick={() => { setScreen(item.key); setEventId(null); }} style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:'3px', background:'none', border:'none', color: active ? 'var(--accent)' : 'var(--text3)', fontSize:'10px', fontWeight:'600', cursor:'pointer', padding:'6px 10px', letterSpacing:'0.03em', transition:'color 0.15s' }}>
                    <I n={item.icon} s={20} c={active ? 'var(--accent)' : 'var(--text3)'} />
                    {item.label}
                  </button>
                );
              })}
            </nav>
          )}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<AuthProvider><App /></AuthProvider>);
  </script>
</body>
</html>
